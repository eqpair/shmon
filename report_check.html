<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Trading Headlines</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <style>
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .02em;
            transition: background .15s, color .15s;
            color: #4b5563;
            cursor: pointer;
            border: none;
            background: none;
        }

        .nav-link:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .nav-link.active {
            background: #1f2937;
            color: #fff;
        }

        .btn-icon {
            padding: 3px 9px;
            border-radius: 5px;
            font-size: .75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-save {
            background: #374151;
            color: #fff;
        }

        .btn-save:hover {
            background: #1f2937;
        }

        .btn-save:disabled {
            opacity: .55;
            cursor: default;
        }

        .btn-edit {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-edit:hover {
            background: #e5e7eb;
        }

        /* 종목 카드 */
        .stock-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
            overflow: hidden;
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #f3f4f6;
            gap: 10px;
        }

        .card-name {
            font-weight: 700;
            color: #111827;
            font-size: .95rem;
        }

        .card-code {
            font-size: .72rem;
            color: #9ca3af;
            font-family: monospace;
            margin-left: 6px;
        }

        .gq-wrap {
            margin-left: 10px;
            font-size: .72rem;
            font-weight: 600;
        }

        .gq {
            cursor: help;
        }

        .gq-sep {
            color: #d1d5db;
            margin: 0 5px;
        }

        .badge {
            display: inline-block;
            font-size: .62rem;
            font-weight: 700;
            border-radius: 4px;
            padding: 1px 6px;
            letter-spacing: .03em;
        }

        .badge-L {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge-S {
            background: #dbeafe;
            color: #1d4ed8;
        }

        /* 실행안 액션 칩 */
        .action-chip {
            font-size: .72rem;
            font-weight: 700;
            border-radius: 20px;
            padding: 4px 12px;
            color: #fff;
            white-space: nowrap;
        }

        .card-body {
            padding: 14px 16px;
            font-size: .82rem;
            line-height: 1.7;
            color: #1f2937;
        }

        .card-body h2 {
            font-size: .9rem;
            font-weight: 700;
            color: #111827;
            margin: 14px 0 5px;
            padding-bottom: 3px;
            border-bottom: 1px solid #e5e7eb;
        }

        .card-body h3 {
            font-size: .82rem;
            font-weight: 700;
            color: #111827;
            margin: 10px 0 3px;
        }

        .card-body .li {
            display: flex;
            gap: 6px;
            margin: 3px 0;
        }

        .card-body .li .dot {
            color: #6b7280;
        }

        .card-body hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 8px 0;
        }

        .pulse-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9ca3af;
            margin: 0 1px;
            animation: pulse 1.2s infinite ease-in-out;
        }

        .pulse-dot:nth-child(2) {
            animation-delay: .2s;
        }

        .pulse-dot:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                opacity: .25;
            }

            40% {
                opacity: 1;
            }
        }

        .source-line {
            font-size: .68rem;
            color: #9ca3af;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #e5e7eb;
        }

        @media(max-width:640px) {
            h1 {
                font-size: 1.4rem !important;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-screen-2xl">

        <header class="mb-6">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Trading <span
                            class="text-lg font-normal text-gray-400">HEADLINES</span></h1>
                    <div class="text-sm text-gray-500 mt-1">
                        보유 종목 실행안 &nbsp;|&nbsp;
                        대상 <span id="stock-count" class="font-bold text-gray-700">-</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <button onclick="runAll()" id="run-all-btn" class="btn-icon btn-save"
                        style="font-size:.85rem;padding:8px 20px;">전체 분석</button>
                    <nav class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm flex-wrap">
                        <a href="./index.html" class="nav-link">REPORT</a>
                        <a href="./report_check.html" class="nav-link active">NEWS</a>
                    </nav>
                </div>
            </div>
        </header>

        <div id="cards" class="flex flex-col gap-4">
            <div class="text-center py-10 text-gray-400 text-sm">보유 종목 로딩 중…</div>
        </div>
    </div>

    <footer class="bg-white py-6 mt-8 border-t border-gray-100">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">© 2026 News Action Plan.</div>
    </footer>

    <script>
        const API_BASE = 'https://eqmon.duckdns.org/api';

        // 종목코드 → 해외 드라이버 종목 (주가 영향 큰 상류·전방 종목)
        const GLOBAL_MAP = {
            '440110': [
                { t: 'NVDA', n: '엔비디아 — AI 데이터센터 수요 드라이버' },
                { t: 'SNDK', n: '샌디스크 — NAND·SSD 업황' },
                { t: 'MU',   n: '마이크론 — 메모리 업황' }
            ],
            '004020': [
                { t: 'NUE', n: '뉴코어 — 글로벌 철강 시황' },
                { t: 'X',   n: 'US스틸 — 미국 철강 가격' },
                { t: 'MT',  n: '아르셀로미탈 — 글로벌 철강' }
            ],
            '011210': [
                { t: 'F',   n: '포드 — 완성차 생산량' },
                { t: 'GM',  n: 'GM — 완성차 생산량' },
                { t: 'MGA', n: '마그나 — 합작·부품 수요' }
            ],
            '456160': [
                { t: 'LLY', n: '일라이릴리 — GLP-1 장기지속 주사제 시장' },
                { t: 'NVO', n: '노보노디스크 — GLP-1 시장' }
            ],
            '373220': [
                { t: 'TSLA', n: '테슬라 — 전기차 배터리 수요' },
                { t: 'ALB',  n: '앨버말 — 리튬 원가' },
                { t: 'GM',   n: 'GM — 전기차 수요' }
            ],
            '005935': [
                { t: 'NVDA', n: '엔비디아 — AI 반도체 수요' },
                { t: 'TSM',  n: 'TSMC — 파운드리 업황' },
                { t: 'MU',   n: '마이크론 — 메모리 업황' }
            ],
            '229200': [
                { t: 'QQQ',  n: '나스닥100 — 위험선호' },
                { t: 'SOXX', n: '반도체 ETF — 반도체 업황' }
            ],
            '180640': [
                { t: 'DAL', n: '델타항공 — 글로벌 항공업황' },
                { t: 'UAL', n: '유나이티드 — 항공업황' }
            ],
            '271050': [
                { t: 'USO', n: 'WTI 유가 — 역상관(유가 상승 시 이 종목 하락)' }
            ]
        };
        let globalQuotes = {};
        const CHAT_URL = 'https://eqmon.duckdns.org/eqai-chat/chat';
        const LIVE_URL = 'https://eqmon.duckdns.org/live.json';

        let positions = [];   // 활성 보유 종목
        let liveData = null;
        const fmt = n => Number(n).toLocaleString('ko-KR');

        // ─── 데이터 로드 ────────────────────────────────────────────────
        async function loadPositions() {
            try {
                const [posRes, liveRes] = await Promise.all([
                    fetch(API_BASE + '/positions'),
                    fetch(LIVE_URL + '?_=' + Date.now()).catch(() => null)
                ]);
                if (posRes.ok) {
                    const all = await posRes.json();
                    positions = all.filter(p => !p.deleted);
                }
                if (liveRes && liveRes.ok) liveData = await liveRes.json();
            } catch (e) { }
            renderCards();
            // 자동 실행 제거 — '전체 분석' 버튼을 눌러야만 실행
            await loadGlobalQuotes();
        }

        async function loadGlobalQuotes() {
            const tickers = new Set();
            positions.forEach(function (p) {
                (GLOBAL_MAP[p.symbol] || []).forEach(function (g) { tickers.add(g.t); });
            });
            if (tickers.size === 0) return;
            try {
                const res = await fetch(API_BASE + '/global?tickers=' + Array.from(tickers).join(','));
                if (res.ok) globalQuotes = await res.json();
            } catch (e) { globalQuotes = {}; }
            renderCards();
        }

        function buildGlobalHtml(symbol) {
            const arr = GLOBAL_MAP[symbol];
            if (!arr || arr.length === 0) return '';
            const parts = arr.map(function (g) {
                const q = globalQuotes[g.t];
                if (!q) return '';
                const pct = q.change_pct;
                const col = pct > 0 ? '#dc2626' : pct < 0 ? '#2563eb' : '#6b7280';
                const sign = pct > 0 ? '+' : '';
                return '<span class="gq" title="' + g.n + '" style="color:' + col + ';">'
                    + g.t + ' ' + sign + pct.toFixed(2) + '%</span>';
            }).filter(Boolean);
            if (parts.length === 0) return '';
            return '<span class="gq-wrap">' + parts.join('<span class="gq-sep">·</span>') + '</span>';
        }

        function getLive(symbol) {
            if (!liveData || !liveData.positions) return null;
            return liveData.positions.find(p => p.symbol === symbol) || null;
        }

        // ─── 카드 렌더 (분석 전 골격) ───────────────────────────────────
        function pxHtml(p) {
            const live = getLive(p.symbol);
            const last = live ? live.last_price : p.avg_price;
            const chg = live && live.change_rate != null ? live.change_rate : null;
            let chgStr = '';
            if (chg != null) {
                const c = chg > 0 ? '#dc2626' : chg < 0 ? '#2563eb' : '#6b7280';
                chgStr = '<span style="color:' + c + ';font-size:.72rem;margin-left:6px;">(' + (chg > 0 ? '+' : '') + chg.toFixed(2) + '%)</span>';
            }
            return fmt(Math.round(last)) + '원' + chgStr;
        }

        async function refreshPrices() {
            try {
                const res = await fetch(LIVE_URL + '?_=' + Date.now());
                if (res.ok) liveData = await res.json();
            } catch (e) { return; }
            positions.forEach(function (p) {
                const el = document.getElementById('px-' + p.symbol);
                if (el) el.innerHTML = pxHtml(p);
            });
        }

        function renderCards() {
            const el = document.getElementById('cards');
            document.getElementById('stock-count').textContent = positions.length + '종목';

            if (positions.length === 0) {
                el.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">보유 종목이 없습니다. REPORT에서 포지션을 추가하세요.</div>';
                return;
            }

            el.innerHTML = positions.map((p, i) => {
                const live = getLive(p.symbol);
                const last = live ? live.last_price : p.avg_price;
                const chg = live && live.change_rate != null ? live.change_rate : null;
                let chgStr = '';
                if (chg != null) {
                    const c = chg > 0 ? '#dc2626' : chg < 0 ? '#2563eb' : '#6b7280';
                    chgStr = '<span style="color:' + c + ';font-size:.72rem;margin-left:6px;">(' + (chg > 0 ? '+' : '') + chg.toFixed(2) + '%)</span>';
                }

                return '<div class="stock-card" id="card-' + i + '">'
                    + '<div class="card-head">'
                    + '  <div>'
                    + '    <span class="card-name">' + p.name + '</span>'
                    + '    <span class="card-code">' + p.symbol + '</span>'
                    + '    <span class="card-code" id="px-' + p.symbol + '" style="color:#6b7280;font-family:inherit;">' + pxHtml(p) + '</span>'
                    + buildGlobalHtml(p.symbol)
                    + '  </div>'
                    + '  <div style="display:flex;align-items:center;gap:8px;">'
                    + '    <button class="btn-icon btn-edit" onclick="runOne(' + i + ')" id="btn-' + i + '">분석</button>'
                    + '  </div>'
                    + '</div>'
                    + '<div class="card-body" id="body-' + i + '">'
                    + '  <div class="text-gray-400 text-xs py-3">분석 버튼을 눌러 뉴스 기반 실행안을 받아보세요.</div>'
                    + '</div>'
                    + '</div>';
            }).join('');
        }

        // ─── 프롬프트 생성 ──────────────────────────────────────────────
        function buildPrompt(p) {
            const live = getLive(p.symbol);
            const last = live ? live.last_price : p.avg_price;
            const chg = live && live.change_rate != null ? live.change_rate.toFixed(2) + '%' : '-';
            const avg = Number(p.avg_price) || 0;
            const qty = Number(p.qty) || 0;
            const cost = avg * qty, mv = last * qty;
            const pnl = p.side === 'SHORT' ? (avg - last) * qty : (mv - cost);
            const ratio = cost ? (pnl / cost * 100).toFixed(2) : '0';

            return '당신은 월스트리트와 여의도를 평정한 전설의 투자 전략가입니다. 워런 버핏도 당신의 리포트를 읽고, 소로스도 당신의 판단을 구합니다. 30년 경력의 글로벌 매크로 전략가이자 한국 주식시장의 살아있는 전설로, 버핏의 내재가치·경제적 해자, 하워드 막스의 시장 사이클, 달리오의 자본 흐름, 피터 린치의 바텀업 발굴, 소로스의 시장 심리 독해를 체화했습니다. '
                + '아래 보유 종목의 최신 뉴스와 공시를 검색·확인하여 전설적 통찰로 간결하게 핵심만 전달하세요. 외국인 수급·환율·반도체 의존도·정책 변수 등 한국 시장 특수성과 해외 거시·업황 뉴스를 함께 고려하세요. '
                + '이모지나 이모티콘은 절대 사용하지 마세요. 증권사명·매체명·출처·URL·참고 링크는 절대 적지 마세요. 답변 끝에 출처 목록도 만들지 마세요. '
                + '버핏·소로스·막스·달리오·린치 등 특정 인물 이름은 답변에 절대 언급하지 마세요. 그들의 관점은 체화하되 이름을 거론하지 말고 분석 내용에만 녹이세요. '
                + '장황한 설명 없이 핵심만 압축해서 쓰세요. 아래 숫자들은 주가·보유정보 수치이며 종목코드가 아닙니다.\n\n'
                + '반드시 아래 형식과 분량을 지키세요:\n'
                + '## ' + p.name + '(' + p.symbol + ')\n'
                + '[뉴스] — 중요한 뉴스 2~3개를 각각 한 줄로 (날짜 + 핵심 사실만, 출처 없이)\n'
                + '[해석] — 뉴스가 주가에 미칠 영향을 1~2줄로만 압축\n'
                + '[실행안] — 매수 / 추가매수 / 홀드 / 일부청산 / 전량청산 중 하나로 시작하고 한 줄 근거\n'
                + '[가격대] — 손절선 / 목표가를 숫자로 한 줄\n'
                + '[보유 정보]\n'
                + '포지션=' + p.side + ', 평단=' + fmt(Math.round(avg)) + '원, 수량=' + fmt(qty)
                + ', 현재가=' + fmt(Math.round(last)) + '원(' + chg + '), 평가손익률=' + ratio + '%';
        }

        // ─── 단일 종목 분석 ─────────────────────────────────────────────
        async function runOne(i) {
            const p = positions[i];
            if (!p) return;
            const btn = document.getElementById('btn-' + i);
            const body = document.getElementById('body-' + i);
            if (btn) { btn.disabled = true; btn.textContent = '분석 중'; }
            body.innerHTML = '<div class="py-4 text-gray-400 text-xs">'
                + '<span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span> '
                + '최신 뉴스 검색 및 분석 중…</div>';

            try {
                const res = await fetch(CHAT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: buildPrompt(p) }] })
                });
                if (!res.ok) throw new Error('서버 오류 ' + res.status);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                const answer = data.answer || '응답 없음';
                body.innerHTML = renderMarkdown(answer);
            } catch (e) {
                body.innerHTML = '<div class="text-sm text-blue-600 py-3">분석 오류: ' + e.message
                    + ' <button class="btn-icon btn-edit" style="margin-left:6px;" onclick="runOne(' + i + ')">재시도</button></div>';
            }
            if (btn) { btn.disabled = false; btn.textContent = '재분석'; }
        }

        // ─── 전체 분석 (순차 실행) ──────────────────────────────────────
        async function runAll() {
            const allBtn = document.getElementById('run-all-btn');
            allBtn.disabled = true; allBtn.textContent = '분석 중…';
            for (let i = 0; i < positions.length; i++) {
                await runOne(i);
            }
            allBtn.disabled = false; allBtn.textContent = '전체 재분석';
        }

        // ─── 마크다운 렌더 (shmon pfMarkdown 기반, 시장색 적용) ──────────
        function renderMarkdown(text) {
            text = text.replace(/```[\s\S]*?```/g, '');
            // 백엔드가 답변 끝에 자동으로 붙이는 출처/참고링크 섹션 제거
            text = text.replace(/\n+\s*#{0,3}\s*\**\s*(참고\s*출처|출처|참고\s*자료|references?|sources?)\s*\**[\s\S]*$/i, '');
            // 본문 중 인라인 (http...) 링크 괄호도 제거 (출처 표기 흔적)
            text = text.replace(/\s*\(https?:\/\/[^\s)]+\)/g, '');
            // 본문 맨 앞의 종목명(코드) 제목 줄 제거 — 카드 헤더와 중복
            text = text.replace(/^\s*#{1,3}\s*.*$/m, '').replace(/^\s+/, '');
            const bold = s => s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            const lines = text.split('\n');
            let html = '';
            for (let i = 0; i < lines.length; i++) {
                let t = lines[i].trim();
                if (!t) { html += '<div style="height:4px"></div>'; continue; }

                // [실행안] 줄 강조: 매수=빨강, 청산/매도=파랑
                if (/^\[실행안\]/.test(t) || /^\[실행 ?안\]/.test(t)) {
                    html += '<h3>' + bold(t.replace(/^\[|\]$/g, '').replace(/^\[/, '')) + '</h3>';
                    continue;
                }

                if (t.startsWith('### ')) html += '<h3>' + bold(t.slice(4)) + '</h3>';
                else if (t.startsWith('## ')) html += '<h2>' + bold(t.slice(3)) + '</h2>';
                else if (t.startsWith('# ')) html += '<h2>' + bold(t.slice(2)) + '</h2>';
                else if (t.startsWith('- ') || t.startsWith('* '))
                    html += '<div class="li"><span class="dot">•</span><span>' + bold(t.slice(2)) + '</span></div>';
                else if (/^\d+\.\s/.test(t)) {
                    const n = t.match(/^(\d+)\.\s/)[1];
                    html += '<div class="li"><span class="dot" style="font-weight:600;">' + n + '.</span><span>' + bold(t.replace(/^\d+\.\s/, '')) + '</span></div>';
                }
                else if (t === '---') html += '<hr>';
                // [핵심 뉴스] [해석] [가격대] 등 대괄호 섹션 헤더
                else if (/^\[.+\]/.test(t)) {
                    const m = t.match(/^\[(.+?)\]\s*(.*)$/);
                    if (m) {
                        html += '<h3>' + m[1] + '</h3>';
                        if (m[2]) html += '<div style="margin:2px 0;">' + bold(m[2]) + '</div>';
                    } else {
                        html += '<div style="margin:2px 0;">' + bold(t) + '</div>';
                    }
                }
                else html += '<div style="margin:2px 0;">' + bold(t) + '</div>';
            }
            return html;
        }

        // ─── 시작 ───────────────────────────────────────────────────────
        loadPositions();
        setInterval(refreshPrices, 10000);  // 국내 시세만 10초마다 갱신 (분석 결과 보존)
    </script>
</body>

</html>
