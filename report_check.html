<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Trading Headlines</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <style>
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .02em;
            transition: background .15s, color .15s;
            color: #4b5563;
            cursor: pointer;
            border: none;
            background: none;
        }

        .nav-link:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .nav-link.active {
            background: #1f2937;
            color: #fff;
        }

        .btn-icon {
            padding: 3px 9px;
            border-radius: 5px;
            font-size: .75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-save {
            background: #374151;
            color: #fff;
        }

        .btn-save:hover {
            background: #1f2937;
        }

        .btn-save:disabled {
            opacity: .55;
            cursor: default;
        }

        .btn-edit {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-edit:hover {
            background: #e5e7eb;
        }

        /* 종목 카드 */
        .stock-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
            overflow: hidden;
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #f3f4f6;
            gap: 10px;
        }

        .card-name {
            font-weight: 700;
            color: #111827;
            font-size: .95rem;
        }

        .card-code {
            font-size: .72rem;
            color: #9ca3af;
            font-family: monospace;
            margin-left: 6px;
        }

        .badge {
            display: inline-block;
            font-size: .62rem;
            font-weight: 700;
            border-radius: 4px;
            padding: 1px 6px;
            letter-spacing: .03em;
        }

        .badge-L {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge-S {
            background: #dbeafe;
            color: #1d4ed8;
        }

        /* 실행안 액션 칩 */
        .action-chip {
            font-size: .72rem;
            font-weight: 700;
            border-radius: 20px;
            padding: 4px 12px;
            color: #fff;
            white-space: nowrap;
        }

        .card-body {
            padding: 14px 16px;
            font-size: .82rem;
            line-height: 1.7;
            color: #1f2937;
        }

        .card-body h2 {
            font-size: .9rem;
            font-weight: 700;
            color: #111827;
            margin: 14px 0 5px;
            padding-bottom: 3px;
            border-bottom: 1px solid #e5e7eb;
        }

        .card-body h3 {
            font-size: .82rem;
            font-weight: 700;
            color: #111827;
            margin: 10px 0 3px;
        }

        .card-body .li {
            display: flex;
            gap: 6px;
            margin: 3px 0;
        }

        .card-body .li .dot {
            color: #6b7280;
        }

        .card-body hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 8px 0;
        }

        .pulse-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9ca3af;
            margin: 0 1px;
            animation: pulse 1.2s infinite ease-in-out;
        }

        .pulse-dot:nth-child(2) {
            animation-delay: .2s;
        }

        .pulse-dot:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                opacity: .25;
            }

            40% {
                opacity: 1;
            }
        }

        .source-line {
            font-size: .68rem;
            color: #9ca3af;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #e5e7eb;
        }

        @media(max-width:640px) {
            h1 {
                font-size: 1.4rem !important;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-screen-2xl">

        <header class="mb-6">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Trading <span
                            class="text-lg font-normal text-gray-400">HEADLINES</span></h1>
                    <div class="text-sm text-gray-500 mt-1">
                        보유 종목 실행안 &nbsp;|&nbsp;
                        대상 <span id="stock-count" class="font-bold text-gray-700">-</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <button onclick="runAll()" id="run-all-btn" class="btn-icon btn-save"
                        style="font-size:.85rem;padding:8px 20px;">전체 분석</button>
                    <nav class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm flex-wrap">
                        <a href="./index.html" class="nav-link">REPORT</a>
                        <a href="./report_check.html" class="nav-link active">NEWS</a>
                    </nav>
                </div>
            </div>
        </header>

        <div id="cards" class="flex flex-col gap-4">
            <div class="text-center py-10 text-gray-400 text-sm">보유 종목 로딩 중…</div>
        </div>
    </div>

    <footer class="bg-white py-6 mt-8 border-t border-gray-100">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">© 2026 News Action Plan.</div>
    </footer>

    <script>
        const API_BASE = 'https://eqmon.duckdns.org/api';
        const CHAT_URL = 'https://eqmon.duckdns.org/eqai-chat/chat';
        const LIVE_URL = 'https://eqmon.duckdns.org/live.json';

        let positions = [];   // 활성 보유 종목
        let liveData = null;
        let ohlcvData = {};   // 종목코드 → {closes, volumes} (기술지표 계산용)
        const fmt = n => Number(n).toLocaleString('ko-KR');

        // ─── 데이터 로드 ────────────────────────────────────────────────
        async function loadPositions() {
            try {
                const [posRes, liveRes] = await Promise.all([
                    fetch(API_BASE + '/positions'),
                    fetch(LIVE_URL + '?_=' + Date.now()).catch(() => null)
                ]);
                if (posRes.ok) {
                    const all = await posRes.json();
                    positions = all.filter(p => !p.deleted);
                }
                if (liveRes && liveRes.ok) liveData = await liveRes.json();
            } catch (e) { }
            renderCards();
            // 기술지표용 일봉 데이터 로드 (화면 표시 없이 프롬프트 근거로만 사용)
            await loadOhlcv();
            // 자동 실행 제거 — '전체 분석' 버튼을 눌러야만 실행
        }

        async function loadOhlcv() {
            if (positions.length === 0) return;
            try {
                const codes = positions.map(p => p.symbol).join(',');
                const res = await fetch(API_BASE + '/ohlcv?codes=' + codes);
                if (res.ok) ohlcvData = await res.json();
            } catch (e) { ohlcvData = {}; }
        }

        function getLive(symbol) {
            if (!liveData || !liveData.positions) return null;
            return liveData.positions.find(p => p.symbol === symbol) || null;
        }

        // ─── 카드 렌더 (분석 전 골격) ───────────────────────────────────
        function renderCards() {
            const el = document.getElementById('cards');
            document.getElementById('stock-count').textContent = positions.length + '종목';

            if (positions.length === 0) {
                el.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">보유 종목이 없습니다. REPORT에서 포지션을 추가하세요.</div>';
                return;
            }

            el.innerHTML = positions.map((p, i) => {
                const live = getLive(p.symbol);
                const last = live ? live.last_price : p.avg_price;
                const chg = live && live.change_rate != null ? live.change_rate : null;
                let chgStr = '';
                if (chg != null) {
                    const c = chg > 0 ? '#dc2626' : chg < 0 ? '#2563eb' : '#6b7280';
                    chgStr = '<span style="color:' + c + ';font-size:.72rem;margin-left:6px;">(' + (chg > 0 ? '+' : '') + chg.toFixed(2) + '%)</span>';
                }
                const sideBadge = '<span class="badge badge-' + (p.side === 'LONG' ? 'L' : 'S') + '">' + (p.side === 'LONG' ? 'LONG' : 'SHORT') + '</span>';

                return '<div class="stock-card" id="card-' + i + '">'
                    + '<div class="card-head">'
                    + '  <div>'
                    + '    <span class="card-name">' + p.name + '</span>'
                    + '    <span class="card-code">' + p.symbol + '</span>'
                    + '    <span class="card-code" style="color:#6b7280;font-family:inherit;">' + fmt(Math.round(last)) + '원' + chgStr + '</span>'
                    + '  </div>'
                    + '  <div style="display:flex;align-items:center;gap:8px;">'
                    + '    ' + sideBadge
                    + '    <button class="btn-icon btn-edit" onclick="runOne(' + i + ')" id="btn-' + i + '">분석</button>'
                    + '  </div>'
                    + '</div>'
                    + '<div class="card-body" id="body-' + i + '">'
                    + '  <div class="text-gray-400 text-xs py-3">분석 버튼을 눌러 뉴스 기반 실행안을 받아보세요.</div>'
                    + '</div>'
                    + '</div>';
            }).join('');
        }

        // ─── 프롬프트 생성 ──────────────────────────────────────────────
        function buildPrompt(p) {
            const live = getLive(p.symbol);
            const last = live ? live.last_price : p.avg_price;
            const chg = live && live.change_rate != null ? live.change_rate.toFixed(2) + '%' : '-';
            const avg = Number(p.avg_price) || 0;
            const qty = Number(p.qty) || 0;
            const cost = avg * qty;
            const mv = last * qty;
            const pnl = p.side === 'SHORT' ? (avg - last) * qty : (mv - cost);
            const ratio = cost ? (pnl / cost * 100).toFixed(2) : '0';
            const tech = indSummary(p.symbol);

            return '당신은 월스트리트와 여의도를 평정한 전설의 투자 전략가입니다. 워런 버핏도 당신의 리포트를 읽고, 소로스도 당신의 판단을 구합니다. 30년 경력의 글로벌 매크로 전략가이자 한국 주식시장의 살아있는 전설로, 중장기 투자 철학과 단기 트레이딩 기술을 모두 완벽하게 구사합니다. '
                + '버핏의 내재가치·경제적 해자, 하워드 막스의 시장 사이클, 레이 달리오의 자본 흐름, 피터 린치의 바텀업 발굴, 소로스의 시장 심리 독해를 체화했고, 단기로는 마크 미너비니의 SEPA·VCP, 스탠 와인스타인의 스테이지 분석, 닥터 엘더의 삼중 스크린을 구사합니다. '
                + '외국인 수급·환율 민감도·반도체 의존도·정책 변수 등 한국 시장 특수성과 해외 거시·업황 뉴스를 함께 고려하세요. '
                + '아래 보유 종목의 최신 뉴스·공시와 함께 제공된 기술적 지표를 종합하여 간결하게 핵심만 전달하세요. '
                + '이모지나 이모티콘은 절대 사용하지 마세요. 증권사명·매체명·출처·URL·참고 링크는 절대 적지 마세요. 답변 끝에 출처 목록도 만들지 마세요. '
                + '중요: 지표 수치(RSI, MACD, 이동평균 값 등)를 그대로 나열하지 마세요. 지표는 판단 근거로만 쓰고, 손절선·목표가·실행안에 자연스럽게 녹여 표현하세요. '
                + '장황한 설명 없이 핵심만 압축해서 쓰세요. 아래 숫자들은 주가·지표 수치이며 종목코드가 아닙니다.\n\n'
                + '반드시 아래 형식과 분량을 지키세요:\n'
                + '## ' + p.name + '(' + p.symbol + ')\n'
                + '[뉴스] — 중요한 뉴스 2~3개를 각각 한 줄로 (날짜 + 핵심 사실만, 출처 없이)\n'
                + '[해석] — 뉴스와 기술적 추세를 묶어 주가 영향을 1~2줄로 압축\n'
                + '[실행안] — 매수 / 추가매수 / 홀드 / 일부청산 / 전량청산 중 하나로 시작하고 한 줄 근거(기술적 위치 반영)\n'
                + '[가격대] — 기술적 지지/저항에 근거한 손절선 / 목표가를 숫자로 한 줄\n\n'
                + '[보유 정보]\n'
                + '포지션=' + p.side + ', 평단=' + fmt(Math.round(avg)) + '원, 수량=' + fmt(qty)
                + ', 현재가=' + fmt(Math.round(last)) + '원(' + chg + '), 평가손익률=' + ratio + '%'
                + (tech ? '\n\n[기술적 지표 (근거용, 화면에 나열 금지)]\n' + tech : '');
        }

        // ─── 단일 종목 분석 ─────────────────────────────────────────────
        async function runOne(i) {
            const p = positions[i];
            if (!p) return;
            const btn = document.getElementById('btn-' + i);
            const body = document.getElementById('body-' + i);
            if (btn) { btn.disabled = true; btn.textContent = '분석 중'; }
            body.innerHTML = '<div class="py-4 text-gray-400 text-xs">'
                + '<span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span> '
                + '최신 뉴스 검색 및 분석 중…</div>';

            try {
                const res = await fetch(CHAT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: buildPrompt(p) }] })
                });
                if (!res.ok) throw new Error('서버 오류 ' + res.status);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                const answer = data.answer || '응답 없음';
                body.innerHTML = renderMarkdown(answer);
            } catch (e) {
                body.innerHTML = '<div class="text-sm text-blue-600 py-3">분석 오류: ' + e.message
                    + ' <button class="btn-icon btn-edit" style="margin-left:6px;" onclick="runOne(' + i + ')">재시도</button></div>';
            }
            if (btn) { btn.disabled = false; btn.textContent = '재분석'; }
        }

        // ─── 전체 분석 (순차 실행) ──────────────────────────────────────
        async function runAll() {
            const allBtn = document.getElementById('run-all-btn');
            allBtn.disabled = true; allBtn.textContent = '분석 중…';
            for (let i = 0; i < positions.length; i++) {
                await runOne(i);
            }
            allBtn.disabled = false; allBtn.textContent = '전체 재분석';
        }

        // ─── 기술지표 계산 (화면 표시 없이 프롬프트 근거용) ────────────
        function calcIndicators(closes, volumes) {
            const n = closes.length;
            const last = closes[n - 1];
            const sma = (arr, p) => { if (arr.length < p) return null; const sl = arr.slice(-p); return sl.reduce((a, b) => a + b, 0) / p; };
            const ma5 = sma(closes, 5), ma20 = sma(closes, 20), ma60 = sma(closes, 60), ma120 = sma(closes, 120);

            let macd = null, hist = null;
            if (closes.length >= 35) {
                const k26 = 2 / 27, k12 = 2 / 13, k9 = 2 / 10;
                let e12 = closes.slice(0, 12).reduce((a, b) => a + b, 0) / 12;
                let e26 = closes.slice(0, 26).reduce((a, b) => a + b, 0) / 26;
                for (let i = 12; i < 26; i++) e12 = closes[i] * k12 + e12 * (1 - k12);
                const macdArr = [];
                for (let i = 26; i < closes.length; i++) {
                    e12 = closes[i] * k12 + e12 * (1 - k12);
                    e26 = closes[i] * k26 + e26 * (1 - k26);
                    macdArr.push(e12 - e26);
                }
                let sig = macdArr.slice(0, 9).reduce((a, b) => a + b, 0) / 9;
                for (let i = 9; i < macdArr.length; i++) sig = macdArr[i] * k9 + sig * (1 - k9);
                macd = macdArr[macdArr.length - 1]; hist = macd - sig;
            }

            let rsi = null;
            if (closes.length >= 15) {
                let gains = 0, losses = 0;
                for (let i = closes.length - 14; i < closes.length; i++) {
                    const d = closes[i] - closes[i - 1];
                    if (d > 0) gains += d; else losses -= d;
                }
                const avgG = gains / 14, avgL = losses / 14;
                rsi = avgL === 0 ? 100 : 100 - (100 / (1 + avgG / avgL));
            }

            let bb = null;
            if (closes.length >= 20) {
                const mid = ma20, sl = closes.slice(-20);
                const std = Math.sqrt(sl.reduce((a, b) => a + (b - mid) ** 2, 0) / 20);
                bb = { upper: mid + 2 * std, lower: mid - 2 * std, pct: (last - (mid - 2 * std)) / (4 * std) * 100 };
            }

            let atr = null;
            if (closes.length >= 15) {
                let sum = 0;
                for (let i = closes.length - 14; i < closes.length; i++) sum += Math.abs(closes[i] - closes[i - 1]);
                atr = sum / 14;
            }

            const yr = closes.slice(-252);
            const hi52 = Math.max(...yr), lo52 = Math.min(...yr);
            const pctFromHi = (last - hi52) / hi52 * 100;
            const pctFromLo = (last - lo52) / lo52 * 100;

            let trend = '중립';
            if (ma5 && ma20 && ma60) {
                if (last > ma5 && ma5 > ma20 && ma20 > ma60) trend = '강한상승';
                else if (last > ma20 && ma20 > ma60) trend = '상승';
                else if (last < ma5 && ma5 < ma20 && ma20 < ma60) trend = '강한하락';
                else if (last < ma20 && ma20 < ma60) trend = '하락';
            }
            let cross = '';
            if (ma5 && ma20) {
                const p5 = sma(closes.slice(0, -1), 5), p20 = sma(closes.slice(0, -1), 20);
                if (p5 < p20 && ma5 >= ma20) cross = '골든크로스';
                else if (p5 > p20 && ma5 <= ma20) cross = '데드크로스';
                else if (ma5 > ma20 && ma20 > ma60) cross = '정배열';
                else if (ma5 < ma20 && ma20 < ma60) cross = '역배열';
            }

            return { last, ma5, ma20, ma60, ma120, macd, hist, rsi, bb, atr, hi52, lo52, pctFromHi, pctFromLo, trend, cross, n };
        }

        function indSummary(symbol) {
            const d = ohlcvData[symbol];
            if (!d || !d.closes || d.closes.length < 20) return null;
            const ind = calcIndicators(d.closes, d.volumes || []);
            const r = n => n != null ? Math.round(n).toLocaleString('ko-KR') : '-';
            const f1 = n => n != null ? n.toFixed(1) : '-';
            return 'MA5=' + r(ind.ma5) + ', MA20=' + r(ind.ma20) + ', MA60=' + r(ind.ma60) + ', MA120=' + r(ind.ma120)
                + ', RSI=' + f1(ind.rsi) + ', MACD히스토그램=' + (ind.hist != null ? Math.round(ind.hist) : '-')
                + ', 볼린저상단=' + r(ind.bb && ind.bb.upper) + ', 볼린저하단=' + r(ind.bb && ind.bb.lower) + ', 볼린저%B=' + f1(ind.bb && ind.bb.pct)
                + ', ATR=' + r(ind.atr) + ', 52주고점=' + r(ind.hi52) + '(' + f1(ind.pctFromHi) + '%), 52주저점=' + r(ind.lo52) + '(' + f1(ind.pctFromLo) + '%)'
                + ', 추세=' + ind.trend + (ind.cross ? ', ' + ind.cross : '');
        }

        // ─── 마크다운 렌더 (shmon pfMarkdown 기반, 시장색 적용) ──────────
        function renderMarkdown(text) {
            text = text.replace(/```[\s\S]*?```/g, '');
            // 백엔드가 답변 끝에 자동으로 붙이는 출처/참고링크 섹션 제거
            text = text.replace(/\n+\s*#{0,3}\s*\**\s*(참고\s*출처|출처|참고\s*자료|references?|sources?)\s*\**[\s\S]*$/i, '');
            // 본문 중 인라인 (http...) 링크 괄호도 제거 (출처 표기 흔적)
            text = text.replace(/\s*\(https?:\/\/[^\s)]+\)/g, '');
            // 본문 맨 앞의 종목명(코드) 제목 줄 제거 — 카드 헤더와 중복
            text = text.replace(/^\s*#{1,3}\s*.*$/m, '').replace(/^\s+/, '');
            const bold = s => s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            const lines = text.split('\n');
            let html = '';
            for (let i = 0; i < lines.length; i++) {
                let t = lines[i].trim();
                if (!t) { html += '<div style="height:4px"></div>'; continue; }

                // [실행안] 줄 강조: 매수=빨강, 청산/매도=파랑
                if (/^\[실행안\]/.test(t) || /^\[실행 ?안\]/.test(t)) {
                    html += '<h3>' + bold(t.replace(/^\[|\]$/g, '').replace(/^\[/, '')) + '</h3>';
                    continue;
                }

                if (t.startsWith('### ')) html += '<h3>' + bold(t.slice(4)) + '</h3>';
                else if (t.startsWith('## ')) html += '<h2>' + bold(t.slice(3)) + '</h2>';
                else if (t.startsWith('# ')) html += '<h2>' + bold(t.slice(2)) + '</h2>';
                else if (t.startsWith('- ') || t.startsWith('* '))
                    html += '<div class="li"><span class="dot">•</span><span>' + bold(t.slice(2)) + '</span></div>';
                else if (/^\d+\.\s/.test(t)) {
                    const n = t.match(/^(\d+)\.\s/)[1];
                    html += '<div class="li"><span class="dot" style="font-weight:600;">' + n + '.</span><span>' + bold(t.replace(/^\d+\.\s/, '')) + '</span></div>';
                }
                else if (t === '---') html += '<hr>';
                // [핵심 뉴스] [해석] [가격대] 등 대괄호 섹션 헤더
                else if (/^\[.+\]/.test(t)) {
                    const m = t.match(/^\[(.+?)\]\s*(.*)$/);
                    if (m) {
                        html += '<h3>' + m[1] + '</h3>';
                        if (m[2]) html += '<div style="margin:2px 0;">' + bold(m[2]) + '</div>';
                    } else {
                        html += '<div style="margin:2px 0;">' + bold(t) + '</div>';
                    }
                }
                else html += '<div style="margin:2px 0;">' + bold(t) + '</div>';
            }
            return html;
        }

        // ─── 시작 ───────────────────────────────────────────────────────
        loadPositions();
    </script>
</body>
