<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Trading REPORT</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./ls-report.css" />
    <style>
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .02em;
            transition: background .15s, color .15s;
            color: #4b5563
        }

        .nav-link:hover {
            background: #f3f4f6;
            color: #1f2937
        }

        .nav-link.active {
            background: #1f2937;
            color: #fff
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch
        }

        .btn-icon {
            padding: 3px 9px;
            border-radius: 5px;
            font-size: .75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all .15s
        }

        .btn-edit {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db
        }

        .btn-edit:hover {
            background: #e5e7eb
        }

        .btn-del {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca
        }

        .btn-del:hover {
            background: #fecaca
        }

        .btn-restore {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0
        }

        .btn-restore:hover {
            background: #a7f3d0
        }

        .btn-save {
            background: #1d4ed8;
            color: #fff;
            border: none
        }

        .btn-save:hover {
            background: #1e40af
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 50;
            align-items: center;
            justify-content: center
        }

        .modal-backdrop.open {
            display: flex
        }

        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .15)
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .form-group.full {
            grid-column: 1/-1
        }

        .form-label {
            font-size: .72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .05em
        }

        .form-input {
            border: 1px solid #d1d5db;
            border-radius: 7px;
            padding: 8px 10px;
            font-size: .88rem;
            color: #111827;
            outline: none;
            width: 100%
        }

        .form-input:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 2px #dbeafe
        }

        .wavg-panel {
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 12px;
            margin-top: 6px
        }

        .wavg-row {
            display: grid;
            grid-template-columns: 2fr 2fr auto;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center
        }

        .wavg-row input {
            padding: 5px 8px;
            font-size: .82rem;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            outline: none;
            width: 100%;
            box-sizing: border-box
        }

        .wavg-row input:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 2px #dbeafe
        }

        .wavg-result {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px
        }

        .wavg-stat {
            background: #1f2937;
            border-radius: 7px;
            padding: 8px 12px
        }

        .wavg-stat-label {
            font-size: .6rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: .07em
        }

        .wavg-stat-value {
            font-size: .92rem;
            font-weight: 700;
            color: #f9fafb;
            margin-top: 2px
        }

        .deleted-section {
            margin-top: 24px
        }

        .deleted-title {
            font-size: .72rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 8px
        }

        .deleted-row td {
            opacity: .45
        }

        .expand-btn {
            background: none;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            font-size: .72rem;
            color: #6b7280;
            padding: 3px 8px;
            border-radius: 5px;
            white-space: nowrap
        }

        .expand-btn:hover {
            background: #f3f4f6;
            color: #374151
        }

        .search-wrap {
            position: relative;
            grid-column: 1/-1
        }

        .search-input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .ac-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .1);
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none
        }

        .ac-dropdown.open {
            display: block
        }

        .ac-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: .85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px
        }

        .ac-item:hover {
            background: #f3f4f6
        }

        .ac-item-name {
            font-weight: 600;
            color: #111827
        }

        .ac-item-code {
            font-size: .75rem;
            color: #6b7280;
            font-family: monospace
        }

        @media(max-width:640px) {
            h1 {
                font-size: 1.4rem !important
            }

            .header-right {
                width: 100%;
                flex-direction: row !important;
                justify-content: space-between;
                align-items: flex-end
            }

            .report-table th,
            .report-table td {
                padding: .35rem .4rem;
                font-size: .72rem
            }

            .table-scroll-wrap {
                position: relative
            }

            .table-scroll-wrap::after {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                width: 24px;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, .85));
                pointer-events: none;
                border-radius: 0 8px 8px 0
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">

        <header class="mb-6">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Trading REPORT</h1>
                    <div class="text-sm text-gray-600 mt-1">Last Update(KST): <span id="lastUpdated"
                            class="font-medium">-</span></div>
                    <div class="text-sm text-gray-600 mt-1">Market: <span id="market-status" class="font-bold">-</span>
                    </div>
                    <div class="text-sm text-gray-600 mt-1">
                        USD/KRW: <span id="fx-usd-krw" class="font-bold text-blue-600">-</span>
                        &nbsp;|&nbsp;WTI: <span id="fx-wti" class="font-bold text-blue-600">-</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2 header-right">
                    <div class="text-right">
                        <div class="text-sm text-gray-600 font-bold">Total Exposure</div>
                        <div id="totalExposure" class="text-xl font-bold text-green-600">-</div>
                        <div class="text-sm text-gray-500 mt-1"><span id="totalPnL" class="font-medium">-</span></div>
                        <br>
                        <nav class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                            <a href="https://eqmon.duckdns.org" class="nav-link">🏠HOME</a>
                            <button onclick="openAdd()" class="nav-link">＋ ADD POSITION</button>
                        </nav>
                    </div>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-lg shadow-md p-4">
            <div class="table-scroll-wrap">
                <div class="table-scroll">
                    <table class="report-table min-w-full text-sm text-gray-700">
                        <thead>
                            <tr class="bg-gray-100 text-gray-800">
                                <th class="px-3 py-2 text-left"></th>
                                <th class="px-3 py-2 text-center">DIR</th>
                                <th class="px-3 py-2 text-right">REF P</th>
                                <th class="px-3 py-2 text-right">VAL P</th>
                                <th class="px-3 py-2 text-right">QTY</th>
                                <th class="px-3 py-2 text-right">EXP</th>
                                <th class="px-3 py-2 text-right">VAL</th>
                                <th class="px-3 py-2 text-right">N PROFIT</th>
                                <th class="px-3 py-2 text-right">N %</th>
                                <th class="px-3 py-2 text-center">WAVG</th>
                                <th class="px-3 py-2 text-center">ADMIN</th>
                            </tr>
                        </thead>
                        <tbody id="report-body">
                            <tr>
                                <td colspan="11" class="text-center py-4">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="deleted-section" class="deleted-section" style="display:none">
            <div class="deleted-title"></div>
            <div class="bg-white rounded-lg shadow-md p-4">
                <div class="table-scroll">
                    <table class="report-table min-w-full text-sm text-gray-700">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="px-3 py-2 text-left"></th>
                                <th class="px-3 py-2 text-center">DIR</th>
                                <th class="px-3 py-2 text-right">REF P</th>
                                <th class="px-3 py-2 text-right">QTY</th>
                                <th class="px-3 py-2 text-right">EXIT PX</th>
                                <th class="px-3 py-2 text-right">P&L</th>
                                <th class="px-3 py-2 text-right">RTN %</th>
                                <th class="px-3 py-2 text-center">ADMIN</th>
                            </tr>
                        </thead>
                        <tbody id="deleted-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white py-6 mt-8">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">© 2026 Monitoring System.</div>
    </footer>

    <!-- 추가/수정 모달 -->
    <div class="modal-backdrop" id="modal">
        <div class="modal-box">
            <h2 id="modal-title" class="text-base font-bold text-gray-900 mb-4">Add Position</h2>
            <div class="form-grid">
                <div class="search-wrap form-group" style="grid-column:1/-1">
                    <label class="form-label">SEARCH</label>
                    <input class="form-input" id="f-search" placeholder="종목명 또는 코드 입력" autocomplete="off"
                        oninput="stockSearch(this.value)">
                    <div class="ac-dropdown" id="ac-dropdown"></div>
                    <div class="search-input-row" style="margin-top:8px">
                        <div class="form-group">
                            <label class="form-label">Code</label>
                            <input class="form-input" id="f-symbol" placeholder="005930">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input class="form-input" id="f-name" placeholder="삼성전자">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Dir</label>
                    <select class="form-input" id="f-side">
                        <option value="LONG">LONG</option>
                        <option value="SHORT">SHORT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Q'ty</label>
                    <input class="form-input" id="f-qty" type="number" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Avg Price</label>
                    <input class="form-input" id="f-avg" type="number" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Exit Price(Optional)</label>
                    <input class="form-input" id="f-exit" type="number" placeholder="0">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button class="btn-icon btn-edit" onclick="closeModal()">Cancel</button>
                <button class="btn-icon btn-save" onclick="savePos()">Save</button>
            </div>
        </div>
    </div>

    <!-- 삭제 모달 -->
    <div class="modal-backdrop" id="del-modal">
        <div class="modal-box">
            <h2 class="text-base font-bold text-gray-900 mb-1">Position Close</h2>
            <p class="text-sm text-gray-500 mb-4"><span id="del-name" class="font-bold text-gray-800"></span></p>
            <div class="form-group mb-4">
                <label class="form-label">Exit Price</label>
                <input class="form-input" id="del-exit-price" type="number" oninput="updateDelPnl()">
            </div>
            <div class="text-center mb-4">
                <div class="text-sm text-gray-500 mb-1">Realized P&L(Est)</div>
                <div id="del-pnl-preview" class="font-bold text-lg">—</div>
            </div>
            <div class="flex justify-end gap-2">
                <button class="btn-icon btn-edit"
                    onclick="document.getElementById('del-modal').classList.remove('open')">Cancel</button>
                <button class="btn-icon btn-del" onclick="confirmDelete()">Confirm Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://eqmon.duckdns.org/api';
        let liveData = null;
        let positions = [];
        let editIndex = -1;
        let deleteIndex = -1;

        // wavgState[wid] = { rows:[{rid,qty,price}], lastResult:{avg,totalQty,totalAmt}|null, prevPos:{qty,avg_price}|null }
        const wavgState = {};
        let wavgRowId = 0;

        const fmt = function (n) { return Number(n).toLocaleString('ko-KR'); };
        const fmtP = function (n, d) {
            d = d === undefined ? 0 : d;
            if (isNaN(n) || !isFinite(n)) return '—';
            return Number(n).toLocaleString('ko-KR', { minimumFractionDigits: d, maximumFractionDigits: d });
        };

        // ─── 데이터 로드 ──────────────────────────────────────────────────────────────

        async function loadAll() {
            try {
                const [liveRes, posRes] = await Promise.all([
                    fetch('https://eqmon.duckdns.org/live.json?_=' + Date.now()),
                    fetch(API_BASE + '/positions')
                ]);
                if (liveRes.ok) liveData = await liveRes.json();
                if (posRes.ok) positions = await posRes.json();
            } catch (e) { }
            render();
        }

        function getLivePrice(symbol) {
            if (!liveData) return null;
            var pos = liveData.positions.find(function (p) { return p.symbol === symbol; });
            return pos ? pos.last_price : null;
        }

        // ─── 렌더 ─────────────────────────────────────────────────────────────────────
        // 핵심 원칙: wavg 패널이 들어있는 td(#wavg-cell-{wid})는 render()에서 절대 건드리지 않음
        // 해당 td는 toggleWavg/wavgAddRow/wavgDelRow/wavgCalc 함수들이 직접 관리

        function render() {
            if (!liveData) return;

            // 헤더
            document.getElementById('lastUpdated').textContent =
                new Date(liveData.as_of).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            document.getElementById('totalExposure').textContent =
                Math.round(Number(liveData.total_exposure) || 0).toLocaleString('ko-KR');
            var tpnl = Number(liveData.total_pnl) || 0;
            var tpnlEl = document.getElementById('totalPnL');
            tpnlEl.textContent = (tpnl > 0 ? '+' : '') + Math.round(tpnl).toLocaleString('ko-KR');
            tpnlEl.className = tpnl > 0 ? 'text-red-600 font-bold' : tpnl < 0 ? 'text-blue-600 font-bold' : 'text-gray-600 font-bold';
            if (liveData.usd_krw)
                document.getElementById('fx-usd-krw').textContent =
                    Number(liveData.usd_krw).toLocaleString('ko-KR', { maximumFractionDigits: 2 });
            if (liveData.wti)
                document.getElementById('fx-wti').textContent = '$ ' + Number(liveData.wti).toFixed(2);

            // 마켓 상태
            var msEl = document.getElementById('market-status');
            var now = new Date();
            var kst = new Date(now.getTime() + (9 * 60 + now.getTimezoneOffset()) * 60000);
            var t = kst.getHours() * 60 + kst.getMinutes();
            if (t >= 540 && t <= 930) { msEl.textContent = '🟢 KRX'; msEl.className = 'font-bold text-green-600'; }
            else if ((t >= 480 && t < 540) || (t > 930 && t <= 1200)) { msEl.textContent = '🔵 NXT'; msEl.className = 'font-bold text-blue-600'; }
            else { msEl.textContent = '⚫ Market Closed'; msEl.className = 'font-bold text-gray-400'; }

            var active = positions
                .map(function (p, i) { return Object.assign({}, p, { _i: i }); })
                .filter(function (p) { return !p.deleted; })
                .sort(function (a, b) { return a._i - b._i; });

            var deleted = positions
                .map(function (p, i) { return Object.assign({}, p, { _i: i }); })
                .filter(function (p) { return p.deleted; })
                .sort(function (a, b) { return a.name.localeCompare(b.name, 'ko'); });

            var tbody = document.getElementById('report-body');

            if (active.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="text-center py-4 text-gray-400">포지션 없음</td></tr>';
            } else {
                active.forEach(function (p) {
                    var i = p._i;
                    var wid = 'w' + i;
                    var avg = Number(p.avg_price) || 0;
                    var qty = Number(p.qty) || 0;
                    var last = getLivePrice(p.symbol) || avg;
                    var cost = avg * qty, mv = last * qty;
                    var pnl = p.side === 'SHORT' ? (avg - last) * qty : mv - cost;
                    var ratio = cost ? pnl / cost : 0;
                    var pnlColor = pnl > 0 ? 'profit-plus' : pnl < 0 ? 'profit-minus' : '';
                    var mkt = liveData.positions.find(function (lp) { return lp.symbol === p.symbol; });
                    var mktMarket = mkt ? mkt.actual_market : null;
                    var mktBadge = mktMarket === 'NX'
                        ? '<span style="font-size:.65rem;background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700;">NXT</span>'
                        : mktMarket === 'J'
                            ? '<span style="font-size:.65rem;background:#f3f4f6;color:#6b7280;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700;">KRX</span>'
                            : '';

                    // wavgState 초기화 (최초 1회만)
                    if (!wavgState[wid]) {
                        wavgState[wid] = {
                            rows: [{ rid: ++wavgRowId, qty: String(qty), price: String(avg) }],
                            lastResult: null,
                            prevPos: null
                        };
                    }

                    var existingTr = tbody.querySelector('tr[data-wid="' + wid + '"]');
                    if (existingTr) {
                        // 행이 이미 있으면 wavg-cell 제외한 나머지 td만 업데이트
                        var tds = existingTr.querySelectorAll('td');
                        // td 0: 종목명
                        tds[0].innerHTML = '<a href="https://finance.naver.com/item/main.naver?code=' + p.symbol + '" target="_blank" class="hover:underline text-gray-800">' + p.name + '</a>';
                        // td 1: DIR
                        tds[1].innerHTML = '<span class="badge badge-' + (p.side === 'LONG' ? 'L' : 'S') + '">' + (p.side === 'LONG' ? 'L' : 'S') + '</span>';
                        // td 2: REF P
                        tds[2].textContent = fmt(Math.round(avg));
                        // td 3: VAL P
                        tds[3].innerHTML = '<span class="font-bold text-green-700">' + fmt(last) + '</span>' + mktBadge;
                        // td 4: Q'ty
                        tds[4].textContent = fmt(qty);
                        // td 5: EXP
                        tds[5].textContent = fmt(Math.round(cost));
                        // td 6: VAL
                        tds[6].textContent = fmt(Math.round(mv));
                        // td 7: N PROFIT
                        tds[7].textContent = fmt(Math.round(pnl));
                        tds[7].className = 'px-3 py-2 text-right ' + pnlColor;
                        // td 8: N %
                        tds[8].textContent = (ratio * 100).toFixed(1) + '%';
                        tds[8].className = 'px-3 py-2 text-right ' + pnlColor;
                        // td 9: wavg-cell → 절대 건드리지 않음
                        // td 10: Admin → 건드리지 않음
                    } else {
                        // 행이 없으면 새로 생성
                        var tr = document.createElement('tr');
                        tr.setAttribute('data-wid', wid);
                        tr.innerHTML = ''
                            + '<td class="px-3 py-2 text-left font-bold"><a href="https://finance.naver.com/item/main.naver?code=' + p.symbol + '" target="_blank" class="hover:underline text-gray-800">' + p.name + '</a></td>'
                            + '<td class="px-3 py-2 text-center"><span class="badge badge-' + (p.side === 'LONG' ? 'L' : 'S') + '">' + (p.side === 'LONG' ? 'L' : 'S') + '</span></td>'
                            + '<td class="px-3 py-2 text-right">' + fmt(Math.round(avg)) + '</td>'
                            + '<td class="px-3 py-2 text-right"><span class="font-bold text-green-700">' + fmt(last) + '</span>' + mktBadge + '</td>'
                            + '<td class="px-3 py-2 text-right">' + fmt(qty) + '</td>'
                            + '<td class="px-3 py-2 text-right">' + fmt(Math.round(cost)) + '</td>'
                            + '<td class="px-3 py-2 text-right">' + fmt(Math.round(mv)) + '</td>'
                            + '<td class="px-3 py-2 text-right ' + pnlColor + '">' + fmt(Math.round(pnl)) + '</td>'
                            + '<td class="px-3 py-2 text-right ' + pnlColor + '">' + (ratio * 100).toFixed(1) + '%</td>'
                            + '<td class="px-3 py-2 text-center" id="wavg-cell-' + wid + '"></td>'
                            + '<td class="px-3 py-2 text-center" style="white-space:nowrap" id="admin-cell-' + wid + '"></td>';
                        tbody.appendChild(tr);
                        // wavg cell 초기화
                        renderWavgCell(wid, i);
                        // admin cell 초기화
                        renderAdminCell(wid, i);
                    }
                });

                // data-wid 없는 행 제거 (Loading... 등)
                tbody.querySelectorAll('tr:not([data-wid])').forEach(function (tr) { tr.remove(); });
                // 삭제된 행 제거 (포지션에서 없어진 경우)
                var activeWids = active.map(function (p) { return 'w' + p._i; });
                tbody.querySelectorAll('tr[data-wid]').forEach(function (tr) {
                    if (activeWids.indexOf(tr.dataset.wid) === -1) tr.remove();
                });
            }

            // Closed Position
            var delSec = document.getElementById('deleted-section');
            if (deleted.length > 0) {
                delSec.style.display = '';
                document.getElementById('deleted-body').innerHTML = deleted.map(function (p) {
                    var cost = Number(p.avg_price) * Number(p.qty);
                    var ratio = cost ? (Number(p.realized_pnl) / cost) * 100 : NaN;
                    var pnlColor = p.realized_pnl > 0 ? 'profit-plus' : p.realized_pnl < 0 ? 'profit-minus' : '';
                    return '<tr class="deleted-row">'
                        + '<td class="px-3 py-2 text-left font-bold text-gray-400">' + p.name + '</td>'
                        + '<td class="px-3 py-2 text-center"><span class="badge badge-' + (p.side === 'LONG' ? 'L' : 'S') + '">' + (p.side === 'LONG' ? 'L' : 'S') + '</span></td>'
                        + '<td class="px-3 py-2 text-right">' + fmt(Math.round(p.avg_price)) + '</td>'
                        + '<td class="px-3 py-2 text-right">' + fmt(p.qty) + '</td>'
                        + '<td class="px-3 py-2 text-right">' + (p.exit_price ? fmt(Math.round(p.exit_price)) : '—') + '</td>'
                        + '<td class="px-3 py-2 text-right ' + pnlColor + '">' + (p.realized_pnl !== undefined ? (p.realized_pnl >= 0 ? '+' : '') + fmt(Math.round(p.realized_pnl)) : '—') + '</td>'
                        + '<td class="px-3 py-2 text-right ' + pnlColor + '">' + (isNaN(ratio) ? '—' : (ratio >= 0 ? '+' : '') + ratio.toFixed(1) + '%') + '</td>'
                        + '<td class="px-3 py-2 text-center" style="white-space:nowrap">'
                        + '<button class="btn-icon btn-edit" onclick="openEdit(' + p._i + ')" style="margin-right:3px">Modify</button>'
                        + '<button class="btn-icon btn-restore" onclick="restorePos(' + p._i + ')" style="margin-right:3px">Restore</button>'
                        + '<button class="btn-icon btn-del" onclick="hardDeletePos(' + p._i + ',\'' + p.name + '\')">Remove</button>'
                        + '</td></tr>';
                }).join('');
            } else {
                delSec.style.display = 'none';
            }
        }

        // ─── Wavg Cell 렌더 ──────────────────────────────────────────────────────────
        // wavg-cell은 render()에서 생성만 하고, 이후 내용은 이 함수들이 전담

        function renderWavgCell(wid, posIdx) {
            var cell = document.getElementById('wavg-cell-' + wid);
            if (!cell) return;
            var state = wavgState[wid];
            var isOpen = state && state.open;

            var btn = document.createElement('button');
            btn.className = 'expand-btn';
            btn.textContent = isOpen ? '▲ Fold' : '▼ Cal';
            btn.onclick = function () { toggleWavg(wid, posIdx); };

            var panel = document.createElement('div');
            panel.id = 'wavg-panel-' + wid;
            panel.style.display = isOpen ? 'block' : 'none';
            if (isOpen) panel.innerHTML = buildWavgPanelHTML(wid, posIdx);

            cell.innerHTML = '';
            cell.appendChild(btn);
            cell.appendChild(panel);
        }

        function renderAdminCell(wid, posIdx) {
            var i = posIdx;
            var cell = document.getElementById('admin-cell-' + wid);
            if (!cell) return;
            cell.innerHTML = ''
                + '<button class="btn-icon btn-edit" onclick="movePos(' + i + ',\'up\')" style="margin-right:2px">▲</button>'
                + '<button class="btn-icon btn-edit" onclick="movePos(' + i + ',\'down\')" style="margin-right:4px">▼</button>'
                + '<button class="btn-icon btn-edit" onclick="openEdit(' + i + ')" style="margin-right:3px">Modify</button>'
                + '<button class="btn-icon btn-del" onclick="openDeleteModal(' + i + ')">Delete</button>';
        }

        // wavg 패널 내부 HTML (순수 문자열, 이벤트 핸들러는 inline onclick)
        function buildWavgPanelHTML(wid, posIdx) {
            var state = wavgState[wid];
            var rowsHTML = '';
            state.rows.forEach(function (r) {
                rowsHTML += '<div class="wavg-row">'
                    + '<input type="number" id="wavg-qty-input-' + r.rid + '" value="' + (r.qty || '') + '" placeholder="Q\'ty" oninput="wavgCalc(\'' + wid + '\')">'
                    + '<input type="number" id="wavg-price-input-' + r.rid + '" value="' + (r.price || '') + '" placeholder="Avg Price" oninput="wavgCalc(\'' + wid + '\')">'
                    + '<button class="btn-icon btn-del" style="padding:3px 7px" onclick="wavgDelRow(\'' + wid + '\',' + r.rid + ',\'' + posIdx + '\')">✕</button>'
                    + '</div>';
            });

            var lr = state.lastResult;
            var vVal = lr && !isNaN(lr.avg) ? fmtP(lr.avg) : '—';
            var qVal = lr ? fmt(lr.totalQty) : '—';
            var aVal = lr ? fmt(Math.round(lr.totalAmt)) : '—';

            var undoBtn = state.prevPos
                ? '<button class="btn-icon btn-restore" style="font-size:.75rem;padding:3px 10px" onclick="wavgUndo(\'' + wid + '\',' + posIdx + ')">↩ Undo</button>'
                : '';

            return '<div class="wavg-panel">'
                + '<div style="font-size:.72rem;color:#6b7280;margin-bottom:8px;font-weight:700;">Weighted Avg Cal</div>'
                + '<div id="wavg-rows-' + wid + '">' + rowsHTML + '</div>'
                + '<div style="display:flex;gap:6px;margin-top:4px">'
                + '<button class="btn-icon btn-edit" style="flex:1;font-size:.75rem" onclick="wavgAddRow(\'' + wid + '\',' + posIdx + ')">+ Add Row</button>'
                + '<button class="btn-icon btn-save" style="font-size:.75rem;padding:3px 14px" onclick="wavgApply(\'' + wid + '\',' + posIdx + ')">Apply</button>'
                + undoBtn
                + '</div>'
                + '<div class="wavg-result">'
                + '<div class="wavg-stat"><div class="wavg-stat-label">Weighted Avg</div><div class="wavg-stat-value" id="wavg-result-avg-' + wid + '">' + vVal + '</div></div>'
                + '<div class="wavg-stat"><div class="wavg-stat-label">Total Q\'ty</div><div class="wavg-stat-value" id="wavg-result-qty-' + wid + '">' + qVal + '</div></div>'
                + '<div class="wavg-stat"><div class="wavg-stat-label">Total Amount</div><div class="wavg-stat-value" id="wavg-result-amt-' + wid + '">' + aVal + '</div></div>'
                + '</div></div>';
        }

        // ─── Wavg 동작 함수 ───────────────────────────────────────────────────────────

        function toggleWavg(wid, posIdx) {
            if (!wavgState[wid]) return;
            wavgState[wid].open = !wavgState[wid].open;
            var panel = document.getElementById('wavg-panel-' + wid);
            var cell = document.getElementById('wavg-cell-' + wid);
            var btn = cell ? cell.querySelector('.expand-btn') : null;
            if (wavgState[wid].open) {
                panel.innerHTML = buildWavgPanelHTML(wid, posIdx);
                panel.style.display = 'block';
                if (btn) btn.textContent = '▲ Fold';
            } else {
                panel.style.display = 'none';
                if (btn) btn.textContent = '▼ Cal';
            }
        }

        function wavgAddRow(wid, posIdx) {
            var rid = ++wavgRowId;
            wavgState[wid].rows.push({ rid: rid, qty: '', price: '' });
            var container = document.getElementById('wavg-rows-' + wid);
            if (!container) return;
            var div = document.createElement('div');
            div.className = 'wavg-row';
            div.innerHTML = ''
                + '<input type="number" id="wavg-qty-input-' + rid + '" placeholder="Q\'ty" oninput="wavgCalc(\'' + wid + '\')">'
                + '<input type="number" id="wavg-price-input-' + rid + '" placeholder="Avg Price" oninput="wavgCalc(\'' + wid + '\')">'
                + '<button class="btn-icon btn-del" style="padding:3px 7px" onclick="wavgDelRow(\'' + wid + '\',' + rid + ',\'' + posIdx + '\')">✕</button>';
            container.appendChild(div);
            div.querySelector('input').focus();
        }

        function wavgDelRow(wid, rid, posIdx) {
            rid = parseInt(rid);
            wavgState[wid].rows = wavgState[wid].rows.filter(function (r) { return r.rid !== rid; });
            var qEl = document.getElementById('wavg-qty-input-' + rid);
            if (qEl) {
                var row = qEl.closest('.wavg-row');
                if (row) row.remove();
            }
            wavgCalc(wid);
        }

        // 실시간 계산 - input DOM 절대 건드리지 않음, 결과 패널만 업데이트
        function wavgCalc(wid) {
            var state = wavgState[wid];
            if (!state) return;
            var totalQty = 0, totalAmt = 0;
            state.rows.forEach(function (r) {
                var qEl = document.getElementById('wavg-qty-input-' + r.rid);
                var pEl = document.getElementById('wavg-price-input-' + r.rid);
                var q = qEl ? (parseFloat(qEl.value) || 0) : 0;
                var p = pEl ? (parseFloat(pEl.value) || 0) : 0;
                if (q > 0 && p > 0) { totalQty += q; totalAmt += q * p; }
            });
            var avg = totalQty > 0 ? totalAmt / totalQty : NaN;
            state.lastResult = { avg: avg, totalQty: totalQty, totalAmt: totalAmt };

            var vEl = document.getElementById('wavg-result-avg-' + wid);
            var qEl = document.getElementById('wavg-result-qty-' + wid);
            var aEl = document.getElementById('wavg-result-amt-' + wid);
            if (vEl) vEl.textContent = isNaN(avg) ? '—' : fmtP(avg);
            if (qEl) qEl.textContent = fmt(totalQty);
            if (aEl) aEl.textContent = fmt(Math.round(totalAmt));
        }

        // Apply - 포지션 서버 저장
        async function wavgApply(wid, posIdx) {
            wavgCalc(wid);
            var lr = wavgState[wid].lastResult;
            if (!lr || isNaN(lr.avg) || lr.totalQty <= 0) {
                alert('유효한 수량과 가격을 입력해주세요.'); return;
            }
            var pos = positions[posIdx];
            if (!pos) return;
            if (!confirm(pos.name + '\nQ\'ty: ' + fmt(lr.totalQty) + '  Avg: ' + fmtP(lr.avg) + '\n\n포지션에 반영하시겠습니까?')) return;
            // 이전값 백업
            wavgState[wid].prevPos = { qty: pos.qty, avg_price: pos.avg_price };
            await fetch(API_BASE + '/positions/' + posIdx, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    symbol: pos.symbol, name: pos.name, side: pos.side,
                    qty: lr.totalQty, avg_price: Math.round(lr.avg),
                    exit_price: pos.exit_price || null
                })
            });
            wavgClose(wid);
            await loadAll();
        }

        // Undo - 이전값 복원
        async function wavgUndo(wid, posIdx) {
            var prev = wavgState[wid] && wavgState[wid].prevPos;
            if (!prev) return;
            var pos = positions[posIdx];
            if (!pos) return;
            if (!confirm('직전 값으로 복원합니다.\nQ\'ty: ' + fmt(prev.qty) + '  Avg: ' + fmtP(prev.avg_price) + '\n\n계속하시겠습니까?')) return;
            await fetch(API_BASE + '/positions/' + posIdx, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    symbol: pos.symbol, name: pos.name, side: pos.side,
                    qty: prev.qty, avg_price: prev.avg_price,
                    exit_price: pos.exit_price || null
                })
            });
            wavgState[wid].prevPos = null;
            wavgClose(wid);
            await loadAll();
        }

        function wavgClose(wid) {
            // 패널 닫기 + wavgState 초기화 (row 값, 결과, open 상태)
            if (!wavgState[wid]) return;
            wavgState[wid].open = false;
            wavgState[wid].lastResult = null;
            var panel = document.getElementById('wavg-panel-' + wid);
            if (panel) { panel.style.display = 'none'; panel.innerHTML = ''; }
            var cell = document.getElementById('wavg-cell-' + wid);
            if (cell) {
                var btn = cell.querySelector('.expand-btn');
                if (btn) btn.textContent = '▼ Cal';
            }
        }

        // ─── Position CRUD ────────────────────────────────────────────────────────────

        function openAdd() {
            editIndex = -1;
            document.getElementById('modal-title').textContent = 'Add Position';
            ['symbol', 'name', 'qty', 'avg'].forEach(function (k) { document.getElementById('f-' + k).value = ''; });
            document.getElementById('f-exit').value = '';
            document.getElementById('f-search').value = '';
            document.getElementById('ac-dropdown').classList.remove('open');
            document.getElementById('f-side').value = 'LONG';
            document.getElementById('modal').classList.add('open');
        }

        function openEdit(i) {
            editIndex = i;
            var p = positions[i];
            document.getElementById('modal-title').textContent = 'Modify Position';
            document.getElementById('f-symbol').value = p.symbol;
            document.getElementById('f-name').value = p.name;
            document.getElementById('f-side').value = p.side;
            document.getElementById('f-qty').value = p.qty;
            document.getElementById('f-avg').value = p.avg_price;
            document.getElementById('f-exit').value = p.exit_price || '';
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); }

        var _acTimer = null;
        function stockSearch(q) {
            clearTimeout(_acTimer);
            var dd = document.getElementById('ac-dropdown');
            if (!q || q.length < 1) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
            _acTimer = setTimeout(async function () {
                try {
                    var res = await fetch(API_BASE + '/search?q=' + encodeURIComponent(q));
                    var data = await res.json();
                    // {code, name} 배열 형식
                    if (!Array.isArray(data) || !data.length) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
                    dd.innerHTML = data.map(function (it) {
                        var code = it.code || '';
                        var name = it.name || '';
                        var safeName = name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
                        return '<div class="ac-item" onclick="selectStock(this)"'
                            + ' data-code="' + code + '" data-name="' + safeName + '">'
                            + '<span class="ac-item-name">' + name + '</span>'
                            + '<span class="ac-item-code">' + code + '</span>'
                            + '</div>';
                    }).join('');
                    dd.classList.add('open');
                } catch (e) { dd.classList.remove('open'); }
            }, 250);
        }

        function selectStock(el) {
            var code = el.dataset.code;
            var name = el.dataset.name;
            document.getElementById('f-symbol').value = code;
            document.getElementById('f-name').value = name;
            document.getElementById('f-search').value = name + ' (' + code + ')';
            document.getElementById('ac-dropdown').classList.remove('open');
        }

        // 드롭다운 외부 클릭시 닫기
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.search-wrap')) {
                var dd = document.getElementById('ac-dropdown');
                if (dd) dd.classList.remove('open');
            }
        });

        async function savePos() {
            var exitPrice = parseFloat(document.getElementById('f-exit').value) || null;
            var body = {
                symbol: document.getElementById('f-symbol').value.trim(),
                name: document.getElementById('f-name').value.trim(),
                side: document.getElementById('f-side').value,
                qty: parseFloat(document.getElementById('f-qty').value),
                avg_price: parseFloat(document.getElementById('f-avg').value),
                exit_price: exitPrice
            };
            if (!body.symbol || !body.name || isNaN(body.qty) || isNaN(body.avg_price)) {
                alert('모든 필드를 입력해주세요.'); return;
            }
            var url = editIndex >= 0 ? API_BASE + '/positions/' + editIndex : API_BASE + '/positions';
            var method = editIndex >= 0 ? 'PUT' : 'POST';
            await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            closeModal();
            await loadAll();
        }

        function openDeleteModal(i) {
            deleteIndex = i;
            var p = positions[i];
            document.getElementById('del-name').textContent = p.name;
            var livePrice = getLivePrice(p.symbol);
            document.getElementById('del-exit-price').value = livePrice || p.avg_price;
            updateDelPnl();
            document.getElementById('del-modal').classList.add('open');
        }

        function updateDelPnl() {
            var i = deleteIndex;
            if (i < 0) return;
            var p = positions[i];
            var exit = parseFloat(document.getElementById('del-exit-price').value) || 0;
            var avg = Number(p.avg_price) || 0;
            var qty = Number(p.qty) || 0;
            var pnl = p.side === 'SHORT' ? (avg - exit) * qty : (exit - avg) * qty;
            var el = document.getElementById('del-pnl-preview');
            el.textContent = (pnl >= 0 ? '+' : '') + Math.round(pnl).toLocaleString('ko-KR') + '원';
            el.className = 'font-bold text-lg ' + (pnl > 0 ? 'text-red-600' : pnl < 0 ? 'text-blue-600' : 'text-gray-600');
        }

        async function confirmDelete() {
            var exit = parseFloat(document.getElementById('del-exit-price').value) || null;
            await fetch(API_BASE + '/positions/' + deleteIndex, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ exit_price: exit })
            });
            document.getElementById('del-modal').classList.remove('open');
            await loadAll();
        }

        async function restorePos(i) {
            await fetch(API_BASE + '/positions/' + i + '/restore', { method: 'POST' });
            await loadAll();
        }

        async function hardDeletePos(i, name) {
            if (!confirm(name + '\n\n완전히 삭제합니다. 복구할 수 없습니다.\n계속하시겠습니까?')) return;
            await fetch(API_BASE + '/positions/' + i + '/purge', { method: 'DELETE' });
            await loadAll();
        }

        async function movePos(i, direction) {
            await fetch(API_BASE + '/positions/' + i + '/move?direction=' + direction, { method: 'POST' });
            await loadAll();
        }

        // ─── Modal backdrop close ─────────────────────────────────────────────────────
        var _mdown = null;
        document.getElementById('modal').addEventListener('mousedown', function (e) { _mdown = e.target; });
        document.getElementById('modal').addEventListener('click', function (e) {
            if (_mdown === e.currentTarget && e.target === e.currentTarget) closeModal();
            _mdown = null;
        });
        var _dmdown = null;
        document.getElementById('del-modal').addEventListener('mousedown', function (e) { _dmdown = e.target; });
        document.getElementById('del-modal').addEventListener('click', function (e) {
            if (_dmdown === e.currentTarget && e.target === e.currentTarget)
                document.getElementById('del-modal').classList.remove('open');
            _dmdown = null;
        });

        // ─── 시작 ─────────────────────────────────────────────────────────────────────
        loadAll();
        setInterval(loadAll, 10000);
    </script>
</body>

</html>
