<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Trading REPORT</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./ls-report.css" />
    <style>
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .02em;
            transition: background .15s, color .15s;
            color: #4b5563
        }

        .nav-link:hover {
            background: #f3f4f6;
            color: #1f2937
        }

        .nav-link.active {
            background: #1f2937;
            color: #fff
        }

        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch
        }

        .btn-icon {
            padding: 3px 9px;
            border-radius: 5px;
            font-size: .75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all .15s
        }

        .btn-edit {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db
        }

        .btn-edit:hover {
            background: #e5e7eb
        }

        .btn-del {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca
        }

        .btn-del:hover {
            background: #fecaca
        }

        .btn-restore {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0
        }

        .btn-restore:hover {
            background: #a7f3d0
        }

        .btn-save {
            background: #1d4ed8;
            color: #fff;
            border: none
        }

        .btn-save:hover {
            background: #1e40af
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 50;
            align-items: center;
            justify-content: center
        }

        .modal-backdrop.open {
            display: flex
        }

        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .15)
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .form-group.full {
            grid-column: 1/-1
        }

        .form-label {
            font-size: .72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .05em
        }

        .form-input {
            border: 1px solid #d1d5db;
            border-radius: 7px;
            padding: 8px 10px;
            font-size: .88rem;
            color: #111827;
            outline: none;
            width: 100%
        }

        .form-input:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 2px #dbeafe
        }

        .wavg-panel {
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 12px;
            margin-top: 6px
        }

        .wavg-row {
            display: grid;
            grid-template-columns: 2fr 2fr auto;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center
        }

        .wavg-row input {
            padding: 5px 8px;
            font-size: .82rem;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            outline: none;
            width: 100%
        }

        .wavg-row input:focus {
            border-color: #1d4ed8
        }

        .wavg-result {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px
        }

        .wavg-stat {
            background: #1f2937;
            border-radius: 7px;
            padding: 8px 12px
        }

        .wavg-stat-label {
            font-size: .6rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: .07em
        }

        .wavg-stat-value {
            font-size: .92rem;
            font-weight: 700;
            color: #f9fafb;
            margin-top: 2px
        }

        .deleted-section {
            margin-top: 24px
        }

        .deleted-title {
            font-size: .72rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 8px
        }

        .deleted-row td {
            opacity: .45
        }

        .expand-btn {
            background: none;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            font-size: .72rem;
            color: #6b7280;
            padding: 3px 8px;
            border-radius: 5px;
            white-space: nowrap
        }

        .expand-btn:hover {
            background: #f3f4f6;
            color: #374151
        }

        @media(max-width:640px) {
            h1 {
                font-size: 1.4rem !important
            }

            .header-right {
                width: 100%;
                flex-direction: row !important;
                justify-content: space-between;
                align-items: flex-end
            }

            .report-table th,
            .report-table td {
                padding: .35rem .4rem;
                font-size: .72rem
            }

            .table-scroll-wrap {
                position: relative
            }

            .table-scroll-wrap::after {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                width: 24px;
                background: linear-gradient(to right, transparent, rgba(255, 255, 255, .85));
                pointer-events: none;
                border-radius: 0 8px 8px 0
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">

        <!-- Header -->
        <header class="mb-6">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Trading REPORT</h1>
                    <div class="text-sm text-gray-600 mt-1">Last Update(KST): <span id="lastUpdated"
                            class="font-medium">-</span></div>
                    <div class="text-sm text-gray-600 mt-1">Market: <span id="market-status" class="font-bold">-</span>
                    </div>
                    <div class="text-sm text-gray-600 mt-1">
                        USD/KRW: <span id="fx-usd-krw" class="font-bold text-blue-600">-</span>
                        &nbsp;|&nbsp;WTI: <span id="fx-wti" class="font-bold text-blue-600">-</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2 header-right">
                    <div class="text-right">
                        <div class="text-sm text-gray-600 font-bold">Total Exposure</div>
                        <div id="totalExposure" class="text-xl font-bold text-green-600">-</div>
                        <div class="text-sm text-gray-500 mt-1"><span id="totalPnL" class="font-medium">-</span></div>
                        <br>
                        <nav class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                            <a href="https://eqmon.duckdns.org" class="nav-link">🏠HOME</a>
                            <button onclick="openAdd()" class="nav-link">＋ Add Position</button>
                        </nav>
                    </div>
                </div>
            </div>
        </header>

        <!-- 메인 테이블 -->
        <div class="bg-white rounded-lg shadow-md p-4">
            <div class="table-scroll-wrap">
                <div class="table-scroll">
                    <table class="report-table min-w-full text-sm text-gray-700">
                        <thead>
                            <tr class="bg-gray-100 text-gray-800">
                                <th class="px-3 py-2 text-left"></th>
                                <th class="px-3 py-2 text-center">DIR</th>
                                <th class="px-3 py-2 text-right">REF P</th>
                                <th class="px-3 py-2 text-right">VAL P</th>
                                <th class="px-3 py-2 text-right">Q'ty</th>
                                <th class="px-3 py-2 text-right">EXP</th>
                                <th class="px-3 py-2 text-right">VAL</th>
                                <th class="px-3 py-2 text-right">N PROFIT</th>
                                <th class="px-3 py-2 text-right">N %</th>
                                <th class="px-3 py-2 text-center">W.avg</th>
                                <th class="px-3 py-2 text-center">Admin</th>
                            </tr>
                        </thead>
                        <tbody id="report-body">
                            <tr>
                                <td colspan="11" class="text-center py-4">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 삭제된 종목 -->
        <div id="deleted-section" class="deleted-section" style="display:none">
            <div class="deleted-title">Closed Position</div>
            <div class="bg-white rounded-lg shadow-md p-4">
                <div class="table-scroll">
                    <table class="report-table min-w-full text-sm text-gray-700">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="px-3 py-2 text-left"></th>
                                <th class="px-3 py-2 text-center">DIR</th>
                                <th class="px-3 py-2 text-right">REF P</th>
                                <th class="px-3 py-2 text-right">Q'ty</th>
                                <th class="px-3 py-2 text-right">Exit Price</th>
                                <th class="px-3 py-2 text-right">Realized P&L</th>
                                <th class="px-3 py-2 text-right">R %</th>
                                <th class="px-3 py-2 text-center">Admin</th>
                            </tr>
                        </thead>
                        <tbody id="deleted-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <footer class="bg-white py-6 mt-8">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">© 2026 Monitoring System.</div>
    </footer>

    <!-- 추가/수정 모달 -->
    <div class="modal-backdrop" id="modal">
        <div class="modal-box">
            <h2 id="modal-title" class="text-base font-bold text-gray-900 mb-4">Add Position</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Code</label>
                    <input class="form-input" id="f-symbol" placeholder="e.g., 005930">
                </div>
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input class="form-input" id="f-name" placeholder="e.g., 삼성전자">
                </div>
                <div class="form-group">
                    <label class="form-label">Dir</label>
                    <select class="form-input" id="f-side">
                        <option value="LONG">LONG</option>
                        <option value="SHORT">SHORT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Q'ty</label>
                    <input class="form-input" id="f-qty" type="number" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Avg Price</label>
                    <input class="form-input" id="f-avg" type="number" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Exit Price(Optional)</label>
                    <input class="form-input" id="f-exit" type="number" placeholder="0">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button class="btn-icon btn-edit" onclick="closeModal()">Cancel</button>
                <button class="btn-icon btn-save" onclick="savePos()">Save</button>
            </div>
        </div>
    </div>
    <!-- 삭제 모달 -->
    <div class="modal-backdrop" id="del-modal">
        <div class="modal-box">
            <h2 class="text-base font-bold text-gray-900 mb-1">Position Close</h2>
            <p class="text-sm text-gray-500 mb-4"><span id="del-name" class="font-bold text-gray-800"></span></p>
            <div class="form-group mb-4">
                <label class="form-label">Exit Price</label>
                <input class="form-input" id="del-exit-price" type="number" oninput="updateDelPnl()">
            </div>
            <div class="text-center mb-4">
                <div class="text-sm text-gray-500 mb-1">Realized P&L(Est)</div>
                <div id="del-pnl-preview" class="font-bold text-lg">—</div>
            </div>
            <div class="flex justify-end gap-2">
                <button class="btn-icon btn-edit"
                    onclick="document.getElementById('del-modal').classList.remove('open')">Cancel</button>
                <button class="btn-icon btn-del" onclick="confirmDelete()">Confirm Close</button>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = 'https://eqmon.duckdns.org/api';
        let liveData = null;
        let positions = [];
        let editIndex = -1;
        let wavgState = {};
        let wavgRowId = 0;

        const fmt = n => Number(n).toLocaleString('ko-KR');
        const fmtP = (n, d = 0) => isNaN(n) || !isFinite(n) ? '—' : Number(n).toLocaleString('ko-KR', { minimumFractionDigits: d, maximumFractionDigits: d });

        async function loadAll() {
            try {
                const [liveRes, posRes] = await Promise.all([
                    fetch('https://eqmon.duckdns.org/live.json?_=' + Date.now()),
                    fetch(API_BASE + '/positions')
                ]);
                if (liveRes.ok) liveData = await liveRes.json();
                if (posRes.ok) positions = await posRes.json();
                render();
            } catch (e) {
                if (liveData) render();
            }
        }

        function getLivePrice(symbol) {
            if (!liveData) return null;
            const pos = liveData.positions.find(p => p.symbol === symbol);
            return pos ? pos.last_price : null;
        }

        function render() {
            if (!liveData) return;

            // 헤더 업데이트
            document.getElementById('lastUpdated').textContent =
                new Date(liveData.as_of).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            document.getElementById('totalExposure').textContent =
                Math.round(Number(liveData.total_exposure) || 0).toLocaleString('ko-KR');
            const tpnl = Number(liveData.total_pnl) || 0;
            const tpnlEl = document.getElementById('totalPnL');
            tpnlEl.textContent = (tpnl > 0 ? '+' : '') + Math.round(tpnl).toLocaleString('ko-KR');
            tpnlEl.className = tpnl > 0 ? 'text-red-600 font-bold' : tpnl < 0 ? 'text-blue-600 font-bold' : 'text-gray-600 font-bold';
            if (liveData.usd_krw)
                document.getElementById('fx-usd-krw').textContent =
                    Number(liveData.usd_krw).toLocaleString('ko-KR', { maximumFractionDigits: 2 });
            if (liveData.wti)
                document.getElementById('fx-wti').textContent = '$ ' + Number(liveData.wti).toFixed(2);

            // 마켓 상태 업데이트
            const msEl = document.getElementById('market-status');
            const now = new Date();
            const kst = new Date(now.getTime() + (9 * 60 + now.getTimezoneOffset()) * 60000);
            const h = kst.getHours(), m = kst.getMinutes();
            const t = h * 60 + m;
            if (t >= 9 * 60 && t <= 15 * 60 + 30) {
                msEl.textContent = '🟢 KRX';
                msEl.className = 'font-bold text-green-600';
            } else if ((t >= 8 * 60 && t < 9 * 60) || (t > 15 * 60 + 30 && t <= 20 * 60)) {
                msEl.textContent = '🔵 NXT';
                msEl.className = 'font-bold text-blue-600';
            } else {
                msEl.textContent = '⚫ Market Closed';
                msEl.className = 'font-bold text-gray-400';
            }

            const active = positions
                .map((p, i) => ({ ...p, _i: i }))
                .filter(p => !p.deleted)
                .sort((a, b) => a._i - b._i);

            const deleted = positions
                .map((p, i) => ({ ...p, _i: i }))
                .filter(p => p.deleted)
                .sort((a, b) => a.name.localeCompare(b.name, 'ko'));

            // 전체 재계산
            let totalExp = 0, totalVal = 0;

            const rows = active.map(p => {
                const i = p._i;
                const avg = Number(p.avg_price) || 0;
                const qty = Number(p.qty) || 0;
                const last = getLivePrice(p.symbol) || avg;
                const cost = avg * qty, mv = last * qty;
                const pnl = p.side === 'SHORT' ? (avg - last) * qty : mv - cost;
                const ratio = cost ? pnl / cost : 0;
                totalExp += cost; totalVal += mv;

                const pnlColor = pnl > 0 ? 'profit-plus' : pnl < 0 ? 'profit-minus' : '';
                const wid = 'w' + i;
                if (!wavgState[wid]) {
                    wavgState[wid] = { open: false, rows: [{ rid: ++wavgRowId, qty: p.qty, price: p.avg_price }] };
                }

                return `<tr>
      <td class="px-3 py-2 text-left font-bold">
        <a href="https://finance.naver.com/item/main.naver?code=${p.symbol}" target="_blank"
           class="hover:underline text-gray-800">${p.name}</a>
      </td>
      <td class="px-3 py-2 text-center">
        <span class="badge badge-${p.side === 'LONG' ? 'L' : 'S'}">${p.side === 'LONG' ? 'L' : 'S'}</span>
      </td>
      <td class="px-3 py-2 text-right">${fmt(Math.round(avg))}</td>
      <td class="px-3 py-2 text-right">
        <span class="font-bold text-green-700">${fmt(last)}</span>
        ${(() => {
                        const mkt = liveData.positions.find(lp => lp.symbol === p.symbol)?.actual_market;
                        if (mkt === 'NX') return '<span style="font-size:.65rem;background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700;">NXT</span>';
                        if (mkt === 'J') return '<span style="font-size:.65rem;background:#f3f4f6;color:#6b7280;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700;">KRX</span>';
                        return '';
                    })()}
        </td>
      <td class="px-3 py-2 text-right">${fmt(qty)}</td>
      <td class="px-3 py-2 text-right">${fmt(Math.round(cost))}</td>
      <td class="px-3 py-2 text-right">${fmt(Math.round(mv))}</td>
      <td class="px-3 py-2 text-right ${pnlColor}">${fmt(Math.round(pnl))}</td>
      <td class="px-3 py-2 text-right ${pnlColor}">${(ratio * 100).toFixed(1)}%</td>
      <td class="px-3 py-2 text-center">
        <button class="expand-btn" onclick="toggleWavg('${wid}',${i})">
          ${wavgState[wid].open ? '▲ Fold' : '▼ Cal'}
        </button>
        <div id="wavg-${wid}" style="display:${wavgState[wid].open ? 'block' : 'none'}">
          ${renderWavg(wid, i)}
        </div>
      </td>
      <td class="px-3 py-2 text-center" style="white-space:nowrap">
        <button class="btn-icon btn-edit" onclick="movePos(${i},'up')" style="margin-right:2px">▲</button>
        <button class="btn-icon btn-edit" onclick="movePos(${i},'down')" style="margin-right:4px">▼</button>
        <button class="btn-icon btn-edit" onclick="openEdit(${i})" style="margin-right:3px">Modify</button>
        <button class="btn-icon btn-del" onclick="openDeleteModal(${i})">Delete</button>
      </td>
    </tr>`;
            }).join('');

            document.getElementById('report-body').innerHTML = rows ||
                '<tr><td colspan="11" class="text-center py-4 text-gray-400">포지션 없음</td></tr>';

            // 삭제된 종목
            const delSec = document.getElementById('deleted-section');
            if (deleted.length > 0) {
                delSec.style.display = '';
                document.getElementById('deleted-body').innerHTML = deleted.map(p => `
      <tr class="deleted-row">
        <td class="px-3 py-2 text-left font-bold text-gray-400">${p.name}</td>
        <td class="px-3 py-2 text-center">
          <span class="badge badge-${p.side === 'LONG' ? 'L' : 'S'}">${p.side === 'LONG' ? 'L' : 'S'}</span>
        </td>
        <td class="px-3 py-2 text-right">${fmt(Math.round(p.avg_price))}</td>
        <td class="px-3 py-2 text-right">${fmt(p.qty)}</td>
        <td class="px-3 py-2 text-right">${p.exit_price ? fmt(Math.round(p.exit_price)) : '—'}</td>
        <td class="px-3 py-2 text-right ${p.realized_pnl > 0 ? 'profit-plus' : p.realized_pnl < 0 ? 'profit-minus' : ''}">
        ${p.realized_pnl !== undefined ? (p.realized_pnl >= 0 ? '+' : '') + fmt(Math.round(p.realized_pnl)) : '—'}
        </td>
        <td class="px-3 py-2 text-right ${p.realized_pnl > 0 ? 'profit-plus' : p.realized_pnl < 0 ? 'profit-minus' : ''}">
        ${(() => {
                        const cost = Number(p.avg_price) * Number(p.qty);
                        const ratio = cost ? (Number(p.realized_pnl) / cost) * 100 : NaN;
                        return isNaN(ratio) ? '—' : (ratio >= 0 ? '+' : '') + ratio.toFixed(1) + '%';
                    })()}
        </td>
        <td class="px-3 py-2 text-center" style="white-space:nowrap">
            <button class="btn-icon btn-edit" onclick="openEdit(${p._i})" style="margin-right:3px">Modify</button>
            <button class="btn-icon btn-restore" onclick="restorePos(${p._i})">Restore</button>
        </td>
      </tr>`).join('');
            } else {
                delSec.style.display = 'none';
            }
        }

        function renderWavg(wid, posIdx) {
            const state = wavgState[wid];
            let totalQty = 0, totalAmt = 0;
            state.rows.forEach(r => {
                const q = parseFloat(r.qty) || 0, p = parseFloat(r.price) || 0;
                if (q > 0 && p > 0) { totalQty += q; totalAmt += q * p; }
            });
            const avg = totalQty > 0 ? totalAmt / totalQty : NaN;

            const rowsHtml = state.rows.map(r => `
    <div class="wavg-row">
      <input type="number" value="${r.qty}" placeholder="Q'ty"
        onchange="wavgUpdate('${wid}',${r.rid},'qty',this.value)">
      <input type="number" value="${r.price}" placeholder="Avg Price"
        onchange="wavgUpdate('${wid}',${r.rid},'price',this.value)">
      <button class="btn-icon btn-del" style="padding:3px 7px"
        onclick="wavgDelRow('${wid}',${r.rid},${posIdx})">✕</button>
    </div>`).join('');

            return `<div class="wavg-panel">
    <div style="font-size:.72rem;color:#6b7280;margin-bottom:8px;font-weight:700;">Weighted Avg Cal<div>
    ${rowsHtml}
    <button class="btn-icon btn-edit" style="width:100%;margin-top:4px;font-size:.75rem"
      onclick="wavgAddRow('${wid}',${posIdx})">+ Add Row</button>
    <div class="wavg-result">
      <div class="wavg-stat"><div class="wavg-stat-label">Weighted Average</div><div class="wavg-stat-value">${fmtP(avg)}</div></div>
      <div class="wavg-stat"><div class="wavg-stat-label">Total Q'ty</div><div class="wavg-stat-value">${fmt(totalQty)}</div></div>
      <div class="wavg-stat"><div class="wavg-stat-label">Total Amount</div><div class="wavg-stat-value">${fmt(Math.round(totalAmt))}</div></div>
    </div>
  </div>`;
        }

        function toggleWavg(wid, posIdx) {
            wavgState[wid].open = !wavgState[wid].open;
            document.getElementById('wavg-' + wid).style.display = wavgState[wid].open ? 'block' : 'none';
            document.querySelector(`[onclick="toggleWavg('${wid}',${posIdx})"]`).textContent =
                wavgState[wid].open ? '▲ Fold' : '▼ Cal';
            if (wavgState[wid].open)
                document.getElementById('wavg-' + wid).innerHTML = renderWavg(wid, posIdx);
        }

        function wavgUpdate(wid, rid, field, val) {
            const row = wavgState[wid].rows.find(r => r.rid === rid);
            if (row) { row[field] = val; refreshWavg(wid); }
        }

        function wavgAddRow(wid, posIdx) {
            wavgState[wid].rows.push({ rid: ++wavgRowId, qty: '', price: '' });
            refreshWavg(wid);
        }

        function wavgDelRow(wid, rid) {
            wavgState[wid].rows = wavgState[wid].rows.filter(r => r.rid !== rid);
            refreshWavg(wid);
        }

        function refreshWavg(wid) {
            const el = document.getElementById('wavg-' + wid);
            if (el) {
                const posIdx = parseInt(wid.replace('w', ''));
                el.innerHTML = renderWavg(wid, posIdx);
            }
        }

        function openAdd() {
            editIndex = -1;
            document.getElementById('modal-title').textContent = 'Add Position';
            ['symbol', 'name', 'qty', 'avg'].forEach(k => document.getElementById('f-' + k).value = '');
            document.getElementById('f-side').value = 'LONG';
            document.getElementById('modal').classList.add('open');
        }

        function openEdit(i) {
            editIndex = i;
            const p = positions[i];
            document.getElementById('modal-title').textContent = 'Modify Position';
            document.getElementById('f-symbol').value = p.symbol;
            document.getElementById('f-name').value = p.name;
            document.getElementById('f-side').value = p.side;
            document.getElementById('f-qty').value = p.qty;
            document.getElementById('f-avg').value = p.avg_price;
            document.getElementById('f-exit').value = p.exit_price || '';
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }

        async function savePos() {
            const exitPrice = parseFloat(document.getElementById('f-exit').value) || null;
            const body = {
                symbol: document.getElementById('f-symbol').value.trim(),
                name: document.getElementById('f-name').value.trim(),
                side: document.getElementById('f-side').value,
                qty: parseFloat(document.getElementById('f-qty').value),
                avg_price: parseFloat(document.getElementById('f-avg').value),
                exit_price: exitPrice,
            };
            if (!body.symbol || !body.name || isNaN(body.qty) || isNaN(body.avg_price)) {
                alert('모든 필드를 입력해주세요.'); return;
            }
            const url = editIndex >= 0 ? API_BASE + '/positions/' + editIndex : API_BASE + '/positions';
            const method = editIndex >= 0 ? 'PUT' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            closeModal();
            await loadAll();
        }

        let deleteIndex = -1;

        function openDeleteModal(i) {
            deleteIndex = i;
            const p = positions[i];
            document.getElementById('del-name').textContent = p.name;
            const livePrice = getLivePrice(p.symbol);
            document.getElementById('del-exit-price').value = livePrice || p.avg_price;
            const avg = Number(p.avg_price) || 0;
            const qty = Number(p.qty) || 0;
            updateDelPnl();
            document.getElementById('del-modal').classList.add('open');
        }

        function updateDelPnl() {
            const i = deleteIndex;
            if (i < 0) return;
            const p = positions[i];
            const exit = parseFloat(document.getElementById('del-exit-price').value) || 0;
            const avg = Number(p.avg_price) || 0;
            const qty = Number(p.qty) || 0;
            const side = p.side || 'LONG';
            const pnl = side === 'SHORT' ? (avg - exit) * qty : (exit - avg) * qty;
            const el = document.getElementById('del-pnl-preview');
            el.textContent = (pnl >= 0 ? '+' : '') + Math.round(pnl).toLocaleString('ko-KR') + '원';
            el.className = 'font-bold text-lg ' + (pnl > 0 ? 'text-red-600' : pnl < 0 ? 'text-blue-600' : 'text-gray-600');
        }

        async function confirmDelete() {
            const exit = parseFloat(document.getElementById('del-exit-price').value) || null;
            await fetch(API_BASE + '/positions/' + deleteIndex, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ exit_price: exit })
            });
            document.getElementById('del-modal').classList.remove('open');
            await loadAll();
        }

        async function restorePos(i) {
            await fetch(API_BASE + '/positions/' + i + '/restore', { method: 'POST' });
            await loadAll();
        }

        async function movePos(i, direction) {
            await fetch(API_BASE + '/positions/' + i + '/move?direction=' + direction, { method: 'POST' });
            await loadAll();
        }

        let mouseDownTarget = null;

        document.getElementById('modal').addEventListener('mousedown', e => {
            mouseDownTarget = e.target;
        });
        document.getElementById('modal').addEventListener('click', e => {
            if (mouseDownTarget === document.getElementById('modal') &&
                e.target === document.getElementById('modal')) closeModal();
            mouseDownTarget = null;
        });

        let delMouseDownTarget = null;

        document.getElementById('del-modal').addEventListener('mousedown', e => {
            delMouseDownTarget = e.target;
        });
        document.getElementById('del-modal').addEventListener('click', e => {
            if (delMouseDownTarget === document.getElementById('del-modal') &&
                e.target === document.getElementById('del-modal'))
                document.getElementById('del-modal').classList.remove('open');
            delMouseDownTarget = null;
        });

        loadAll();
        setInterval(loadAll, 10000);
    </script>
</body>

</html>
