<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Trading * Weighted Average</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* ── Nav ── */
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: background 0.15s, color 0.15s;
            color: #4b5563;
        }

        .nav-link:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .nav-link.active {
            background: #1f2937;
            color: #fff;
        }

        /* ── 계산기 카드 ── */
        .calc-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            padding: 18px 20px;
            margin-bottom: 16px;
            animation: slideIn 0.2s ease;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .ticker-input {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
            border: none;
            border-bottom: 2px solid #e5e7eb;
            outline: none;
            width: 180px;
            padding: 2px 4px;
            transition: border-color 0.15s;
        }

        .ticker-input:focus {
            border-color: #6b7280;
        }

        .ticker-input::placeholder {
            color: #d1d5db;
            font-weight: 400;
        }

        /* dir toggle */
        .dir-toggle {
            display: flex;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            overflow: hidden;
        }

        .dir-toggle button {
            padding: 3px 10px;
            font-size: 0.72rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: #fff;
            color: #9ca3af;
            transition: background 0.12s, color 0.12s;
        }

        .dir-toggle button.sel-long {
            background: #15803d;
            color: #fff;
        }

        .dir-toggle button.sel-short {
            background: #b91c1c;
            color: #fff;
        }

        /* trade rows */
        .trade-row {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr auto;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
        }

        .trade-row input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            padding: 5px 8px;
            font-size: 0.82rem;
            text-align: center;
            outline: none;
            transition: border-color 0.15s;
        }

        .trade-row input.memo-input {
            text-align: center;
        }

        .trade-row input:focus {
            border-color: #6b7280;
        }

        /* column headers */
        .col-headers {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr auto;
            gap: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }

        /* result bar */
        .result-bar {
            background: #1f2937;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .rb-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
        }

        .rb-value {
            font-size: 1rem;
            font-weight: 700;
            color: #f9fafb;
            margin-top: 2px;
        }

        /* breakdown */
        .breakdown {
            margin-top: 10px;
            display: none;
        }

        .breakdown table {
            width: 100%;
            font-size: 0.78rem;
        }

        .breakdown th {
            color: #9ca3af;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 0.06em;
            padding-bottom: 4px;
            text-align: right;
        }

        .breakdown th:first-child {
            text-align: left;
        }

        .breakdown td {
            padding: 3px 0;
            color: #d1d5db;
            border-top: 1px solid #374151;
            text-align: right;
        }

        .breakdown td:first-child {
            text-align: left;
        }

        .breakdown td.w-pct {
            color: #fbbf24;
        }

        /* buttons */
        .btn-del-row {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 1rem;
            padding: 2px 5px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }

        .btn-del-row:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .btn-del-card {
            background: none;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            color: #9ca3af;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 5px;
            margin-left: auto;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
        }

        .btn-del-card:hover {
            color: #b91c1c;
            background: #fee2e2;
            border-color: #fca5a5;
        }

        .btn-reset-card {
            background: none;
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            padding: 3px 10px;
            font-size: 0.75rem;
            color: #9ca3af;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .btn-reset-card:hover {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-add-calc {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 2px dashed #d1d5db;
            background: transparent;
            color: #9ca3af;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
            margin-top: 4px;
        }

        .btn-add-calc:hover {
            border-color: #6b7280;
            color: #374151;
            background: #f9fafb;
        }

        /* ── 모바일 대응 ── */
        @media (max-width: 640px) {
            h1 {
                font-size: 1.4rem !important;
            }

            .calc-card {
                padding: 14px;
            }

            /* ticker 입력 폭 줄이기 */
            .ticker-input {
                width: 120px;
                font-size: 0.9rem;
            }

            /* result bar: 4열 → 2×2 */
            .result-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            /* trade row: memo 숨기고 3열로 */
            .trade-row {
                grid-template-columns: 2fr 2fr auto;
            }

            .trade-row .memo-input {
                display: none;
            }

            .col-headers {
                grid-template-columns: 2fr 2fr auto;
            }

            .col-headers div:first-child {
                display: none;
            }

            /* breakdown 테이블: memo 컬럼 숨기기 */
            .breakdown th:first-child,
            .breakdown td:first-child {
                display: none;
            }

            .rb-value {
                font-size: 0.9rem;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1)
            }

            30% {
                transform: scale(1.03)
            }

            100% {
                transform: scale(1)
            }
        }

        .pop {
            animation: pop 0.18s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ── 포지션 말풍선 ── */
        .pos-bar {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            padding: 14px 18px;
            margin-bottom: 16px;
        }

        .pos-bar-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 10px;
        }

        .pos-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .pos-chip {
            display: inline-flex;
            flex-direction: column;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.78rem;
            line-height: 1.4;
        }

        .pos-chip:hover {
            border-color: #6b7280;
            background: #f3f4f6;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .pos-chip .chip-name {
            font-weight: 700;
            color: #1f2937;
        }

        .pos-chip .chip-detail {
            font-size: 0.68rem;
            color: #6b7280;
        }

        .pos-chip.side-long {
            border-color: #bbf7d0;
            background: #f0fdf4;
        }

        .pos-chip.side-long:hover {
            border-color: #15803d;
            background: #dcfce7;
        }

        .pos-chip.side-short {
            border-color: #fecaca;
            background: #fff5f5;
        }

        .pos-chip.side-short:hover {
            border-color: #b91c1c;
            background: #fee2e2;
        }

        .pos-loading {
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8" style="max-width:860px">

        <!-- Header -->
        <header class="mb-6">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Trading REPORT</h1>
                    <p class="text-sm text-gray-500 mt-1">Weighted Average Calculator</p>
                </div>
                <nav class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm self-start">
                    <a href="./index.html" class="nav-link">📊 Report</a>
                </nav>
            </div>
        </header>

        <!-- 포지션 말풍선 -->
        <div class="pos-bar">
            <div class="pos-bar-title">📋 Current Positions &nbsp;— Click to load</div>
            <div class="pos-chips" id="posChips">
                <span class="pos-loading">live.json 로딩 중...</span>
            </div>
        </div>

        <!-- Calculators -->
        <div id="calcContainer"></div>

        <!-- Add calculator -->
        <button class="btn-add-calc" onclick="addCalc()">＋ Add Calculator</button>

    </div>

    <footer class="bg-white py-6 mt-8">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            <p>© 2026 Monitoring System.</p>
        </div>
    </footer>

    <script>
        let calcId = 0;
        let rowId = 0;

        const fmt = (n, d = 0) => isNaN(n) || !isFinite(n) ? '—' : n.toLocaleString('ko-KR', { minimumFractionDigits: d, maximumFractionDigits: d });
        const fmtP = (n, d = 2) => isNaN(n) || !isFinite(n) ? '—' : n.toLocaleString('ko-KR', { minimumFractionDigits: d, maximumFractionDigits: d });

        function addCalc() {
            const cid = ++calcId;
            const card = document.createElement('div');
            card.className = 'calc-card';
            card.id = `calc-${cid}`;
            card.innerHTML = `
        <div class="card-header">
            <input class="ticker-input" placeholder="Ticker / Name" id="ticker-${cid}">
            <div class="dir-toggle">
                <button id="long-${cid}"  onclick="setDir(${cid},'LONG')"  class="sel-long">LONG</button>
                <button id="short-${cid}" onclick="setDir(${cid},'SHORT')">SHORT</button>
            </div>
            <button class="btn-reset-card" onclick="resetCalc(${cid})">↺ Reset</button>
            <button class="btn-del-card"   onclick="removeCalc(${cid})">✕ Remove</button>
        </div>
        <div class="col-headers">
            <div class="text-center">Memo</div>
            <div class="text-center">QTY</div>
            <div class="text-center">Price</div>
            <div></div>
        </div>
        <div id="rows-${cid}"></div>
        <div class="result-bar">
            <div>
                <div class="rb-label">Direction</div>
                <div class="rb-value" id="res-dir-${cid}" style="color:#4ade80">LONG</div>
            </div>
            <div>
                <div class="rb-label">Weighted Avg</div>
                <div class="rb-value" id="res-avg-${cid}">—</div>
            </div>
            <div>
                <div class="rb-label">Total QTY</div>
                <div class="rb-value" id="res-qty-${cid}">—</div>
            </div>
            <div>
                <div class="rb-label">Total Amount</div>
                <div class="rb-value" id="res-amt-${cid}">—</div>
            </div>
        </div>
        <div class="breakdown" id="breakdown-${cid}">
            <table>
                <thead>
                    <tr>
                        <th>Memo</th>
                        <th>QTY</th>
                        <th>Price</th>
                        <th>Amount</th>
                        <th>Weight</th>
                    </tr>
                </thead>
                <tbody id="bd-body-${cid}"></tbody>
            </table>
        </div>
    `;
            document.getElementById('calcContainer').appendChild(card);
            addRow(cid, 'Entry', '', '');
            addRow(cid, 'Add', '', '');
        }

        function removeCalc(cid) {
            const el = document.getElementById(`calc-${cid}`);
            if (el) el.remove();
        }

        function resetCalc(cid) {
            if (!confirm('Reset this calculator?')) return;
            document.getElementById(`rows-${cid}`).innerHTML = '';
            document.getElementById(`ticker-${cid}`).value = '';
            addRow(cid, 'Entry', '', '');
            addRow(cid, 'Add', '', '');
            calcOne(cid);
        }

        function setDir(cid, d) {
            document.getElementById(`long-${cid}`).className = d === 'LONG' ? 'sel-long' : '';
            document.getElementById(`short-${cid}`).className = d === 'SHORT' ? 'sel-short' : '';
            const el = document.getElementById(`res-dir-${cid}`);
            el.textContent = d;
            el.style.color = d === 'LONG' ? '#4ade80' : '#f87171';
        }

        function addRow(cid, memo = '', qty = '', price = '') {
            const rid = ++rowId;
            const div = document.createElement('div');
            div.className = 'trade-row';
            div.id = `row-${rid}`;
            div.innerHTML = `
        <input type="text"   class="memo-input" placeholder="Memo (opt)" value="${memo}"  id="m-${rid}" oninput="calcOne(${cid})">
        <input type="number" placeholder="0"    value="${qty}"            id="q-${rid}"   oninput="calcOne(${cid})" min="0">
        <input type="number" placeholder="0.00" value="${price}"          id="p-${rid}"   oninput="calcOne(${cid})" min="0" step="any">
        <button class="btn-del-row" onclick="removeRow(${cid},${rid})">✕</button>
    `;
            document.getElementById(`rows-${cid}`).appendChild(div);
            calcOne(cid);
        }

        function removeRow(cid, rid) {
            const el = document.getElementById(`row-${rid}`);
            if (el) { el.remove(); calcOne(cid); }
        }

        function calcOne(cid) {
            const rows = document.getElementById(`rows-${cid}`)?.querySelectorAll('.trade-row') || [];
            let totalQty = 0, totalAmt = 0;
            const breakdown = [];

            rows.forEach(row => {
                const rid = row.id.replace('row-', '');
                const q = parseFloat(document.getElementById(`q-${rid}`)?.value) || 0;
                const p = parseFloat(document.getElementById(`p-${rid}`)?.value) || 0;
                const memo = document.getElementById(`m-${rid}`)?.value || '';
                if (q > 0 && p > 0) {
                    totalQty += q; totalAmt += q * p;
                    breakdown.push({ memo: memo || `Trade ${rid}`, qty: q, price: p, amt: q * p });
                }
            });

            const avg = totalQty > 0 ? totalAmt / totalQty : NaN;
            const setVal = (id, text) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = text;
                el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
            };
            setVal(`res-avg-${cid}`, fmtP(avg));
            setVal(`res-qty-${cid}`, fmt(totalQty));
            setVal(`res-amt-${cid}`, fmt(totalAmt));

            const bWrap = document.getElementById(`breakdown-${cid}`);
            const bBody = document.getElementById(`bd-body-${cid}`);
            if (breakdown.length > 0) {
                bWrap.style.display = '';
                bBody.innerHTML = breakdown.map(r => `
            <tr>
                <td>${r.memo}</td>
                <td>${fmt(r.qty)}</td>
                <td>${fmtP(r.price)}</td>
                <td>${fmt(r.amt)}</td>
                <td class="w-pct">${fmtP(r.amt / totalAmt * 100, 1)}%</td>
            </tr>
        `).join('');
            } else {
                bWrap.style.display = 'none';
            }
        }


        /* positions */
        let _positions = [];

        async function initPositions() {
            const wrap = document.getElementById('posChips');
            try {
                const res = await fetch('./web/live.json?t=' + Date.now());
                if (!res.ok) throw new Error();
                const cfg = await res.json();
                _positions = cfg.positions || [];
                if (!_positions.length) { wrap.innerHTML = '<span class="pos-loading">포지션 없음</span>'; return; }
                wrap.innerHTML = _positions.map((p, i) => {
                    const sc = p.side === 'SHORT' ? 'side-short' : 'side-long';
                    const sb = p.side === 'SHORT' ? '<span style="font-size:.6rem;color:#b91c1c;font-weight:700;">S</span>' : '<span style="font-size:.6rem;color:#15803d;font-weight:700;">L</span>';
                    return '<button class="pos-chip ' + sc + '" onclick="applyPosition(' + i + ')">' +
                        '<span class="chip-name">' + p.name + '</span>' +
                        '<span class="chip-detail">' + p.qty.toLocaleString('ko-KR') + '주 · ' + p.avg_price.toLocaleString('ko-KR') + '원</span>' +
                        '</button>';
                }).join('');
            } catch (e) {
                wrap.innerHTML = '<span class="pos-loading" style="color:#ef4444;">live.json 로드 실패</span>';
            }
        }

        function applyPosition(idx) {
            const p = _positions[idx];
            if (!p) return;
            const cid = ++calcId;
            const card = document.createElement('div');
            card.className = 'calc-card';
            card.id = 'calc-' + cid;
            card.innerHTML = buildCardHTML(cid);
            document.getElementById('calcContainer').appendChild(card);
            document.getElementById('ticker-' + cid).value = p.name;
            setDir(cid, p.side === 'SHORT' ? 'SHORT' : 'LONG');
            const rid = ++rowId;
            const div = document.createElement('div');
            div.className = 'trade-row';
            div.id = 'row-' + rid;
            div.innerHTML =
                '<input type="text" class="memo-input" value="Current" id="m-' + rid + '" oninput="calcOne(' + cid + ')">' +
                '<input type="number" value="' + p.qty + '" id="q-' + rid + '" oninput="calcOne(' + cid + ')" min="0">' +
                '<input type="number" value="' + p.avg_price + '" id="p-' + rid + '" oninput="calcOne(' + cid + ')" min="0" step="any">' +
                '<button class="btn-del-row" onclick="removeRow(' + cid + ',' + rid + ')">x</button>';
            document.getElementById('rows-' + cid).appendChild(div);
            addRow(cid, 'Add', '', '');
            calcOne(cid);
            setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        }

        function buildCardHTML(cid) {
            return '<div class="card-header">' +
                '<input class="ticker-input" placeholder="Ticker / Name" id="ticker-' + cid + '">' +
                '<div class="dir-toggle">' +
                '<button id="long-' + cid + '" onclick="setDir(' + cid + ',\'LONG\')" class="sel-long">LONG</button>' +
                '<button id="short-' + cid + '" onclick="setDir(' + cid + ',\'SHORT\')">SHORT</button>' +
                '</div>' +
                '<button class="btn-reset-card" onclick="resetCalc(' + cid + ')">Reset</button>' +
                '<button class="btn-del-card" onclick="removeCalc(' + cid + ')">Remove</button>' +
                '</div>' +
                '<div class="col-headers"><div class="text-center">Memo</div><div class="text-center">QTY</div><div class="text-center">Price</div><div></div></div>' +
                '<div id="rows-' + cid + '"></div>' +
                '<div class="result-bar">' +
                '<div><div class="rb-label">Direction</div><div class="rb-value" id="res-dir-' + cid + '" style="color:#4ade80">LONG</div></div>' +
                '<div><div class="rb-label">Weighted Avg</div><div class="rb-value" id="res-avg-' + cid + '">-</div></div>' +
                '<div><div class="rb-label">Total QTY</div><div class="rb-value" id="res-qty-' + cid + '">-</div></div>' +
                '<div><div class="rb-label">Total Amount</div><div class="rb-value" id="res-amt-' + cid + '">-</div></div>' +
                '</div>' +
                '<div class="breakdown" id="breakdown-' + cid + '"><table><thead><tr><th>Memo</th><th>QTY</th><th>Price</th><th>Amount</th><th>Weight</th></tr></thead><tbody id="bd-body-' + cid + '"></tbody></table></div>';
        }

        initPositions();
    </script>
</body>

</html>
