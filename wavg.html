<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>L Trading — 가중평균 계산기</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <style>
        /* ── 기존 ls-report.css 연동을 위해 공통 변수/스타일만 인라인 ── */
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: background 0.15s, color 0.15s;
            color: #4b5563;
        }

        .nav-link:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .nav-link.active {
            background: #1f2937;
            color: #fff;
        }

        /* ── 입력 행 ── */
        .trade-row {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr auto;
            gap: 8px;
            align-items: center;
        }

        .trade-row input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.85rem;
            text-align: right;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        .trade-row input:focus {
            border-color: #6b7280;
            box-shadow: 0 0 0 2px rgba(107, 114, 128, 0.15);
        }

        .trade-row input.error {
            border-color: #ef4444;
        }

        /* ── 결과 카드 ── */
        .result-card {
            background: #1f2937;
            color: #f9fafb;
            border-radius: 12px;
            padding: 24px 28px;
        }

        .result-card .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
        }

        .result-card .value {
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 2px;
        }

        .result-card .sub {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-top: 4px;
        }

        .badge-long {
            background: #dcfce7;
            color: #15803d;
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .badge-short {
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        /* ── 버튼 ── */
        .btn-add {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-add:hover {
            background: #e5e7eb;
        }

        .btn-del {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 1.1rem;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }

        .btn-del:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        .btn-reset {
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .btn-reset:hover {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fca5a5;
        }

        /* ── 구분선 ── */
        .divider {
            border: none;
            border-top: 1px dashed #e5e7eb;
            margin: 16px 0;
        }

        /* ── 토글 ── */
        .dir-toggle {
            display: flex;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            overflow: hidden;
        }

        .dir-toggle button {
            flex: 1;
            padding: 5px 0;
            font-size: 0.75rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            background: #fff;
            color: #9ca3af;
        }

        .dir-toggle button.sel-long {
            background: #15803d;
            color: #fff;
        }

        .dir-toggle button.sel-short {
            background: #b91c1c;
            color: #fff;
        }

        /* 숫자 포맷 애니메이션 */
        @keyframes pop {
            0% {
                transform: scale(1)
            }

            30% {
                transform: scale(1.04)
            }

            100% {
                transform: scale(1)
            }
        }

        .pop {
            animation: pop 0.2s ease;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8" style="max-width:860px">

        <!-- Header -->
        <header class="mb-6">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">L Trading REPORT</h1>
                    <p class="text-sm text-gray-500 mt-1">가중평균 단가 계산기</p>
                </div>
                <!-- Nav -->
                <nav class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm self-start">
                    <a href="./index.html" class="nav-link">📊 리포트</a>
                    <a href="./wavg.html" class="nav-link active">⚖️ 가중평균</a>
                </nav>
            </div>
        </header>

        <!-- Main card -->
        <div class="bg-white rounded-lg shadow-md p-5 mb-4">

            <!-- Direction toggle -->
            <div class="flex items-center gap-3 mb-4">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">방향</span>
                <div class="dir-toggle" id="dirToggle" style="width:120px">
                    <button id="btnLong" onclick="setDir('LONG')" class="sel-long">LONG</button>
                    <button id="btnShort" onclick="setDir('SHORT')">SHORT</button>
                </div>
                <span class="text-xs text-gray-400">(가중평균 계산에는 방향이 영향을 주지 않습니다)</span>
            </div>

            <hr class="divider">

            <!-- Column headers -->
            <div class="trade-row mb-1"
                style="font-size:0.7rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;">
                <div class="text-right">종목 / 메모</div>
                <div class="text-right">주식 수 (QTY)</div>
                <div class="text-right">매매가 (PRICE)</div>
                <div></div>
            </div>

            <!-- Trade rows container -->
            <div id="tradeRows"></div>

            <!-- Add row button -->
            <div class="flex gap-2 mt-3">
                <button class="btn-add" onclick="addRow()">＋ 행 추가</button>
                <button class="btn-reset" onclick="resetAll()">↺ 초기화</button>
            </div>
        </div>

        <!-- Result card -->
        <div class="result-card" id="resultCard">
            <div class="grid grid-cols-2 gap-6 sm:grid-cols-4">
                <div>
                    <div class="label">방향</div>
                    <div class="value text-2xl" id="resDir">LONG</div>
                </div>
                <div>
                    <div class="label">가중평균 단가</div>
                    <div class="value" id="resAvg">—</div>
                    <div class="sub" id="resAvgKrw"></div>
                </div>
                <div>
                    <div class="label">총 수량</div>
                    <div class="value" id="resQty">—</div>
                </div>
                <div>
                    <div class="label">총 투자금액</div>
                    <div class="value" id="resTotal">—</div>
                    <div class="sub" id="resTotalKrw"></div>
                </div>
            </div>

            <!-- Breakdown table -->
            <div id="breakdownWrap" class="mt-5" style="display:none">
                <hr style="border-color:#374151;margin-bottom:12px">
                <div class="text-xs text-gray-400 uppercase tracking-widest mb-2">구성 내역</div>
                <table class="w-full text-sm" id="breakdownTable">
                    <thead>
                        <tr style="color:#9ca3af;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em">
                            <th class="text-left pb-1">메모</th>
                            <th class="text-right pb-1">QTY</th>
                            <th class="text-right pb-1">PRICE</th>
                            <th class="text-right pb-1">금액</th>
                            <th class="text-right pb-1">비중</th>
                        </tr>
                    </thead>
                    <tbody id="breakdownBody"></tbody>
                </table>
            </div>
        </div>


    </div>

    <footer class="bg-white py-6 mt-8">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            <p>© 2025 Monitoring System.</p>
        </div>
    </footer>

    <script>
        /* ── State ── */
        let direction = 'LONG';
        let rowId = 0;

        /* ── Direction toggle ── */
        function setDir(d) {
            direction = d;
            document.getElementById('btnLong').className = d === 'LONG' ? 'sel-long' : '';
            document.getElementById('btnShort').className = d === 'SHORT' ? 'sel-short' : '';
            document.getElementById('resDir').textContent = d;
            document.getElementById('resDir').style.color = d === 'LONG' ? '#4ade80' : '#f87171';
        }

        /* ── Number formatting ── */
        const fmt = (n, d = 0) => isNaN(n) ? '—' : n.toLocaleString('ko-KR', { minimumFractionDigits: d, maximumFractionDigits: d });
        const fmtP = (n, d = 2) => isNaN(n) ? '—' : n.toLocaleString('ko-KR', { minimumFractionDigits: d, maximumFractionDigits: d });

        /* ── Add / remove rows ── */
        function addRow(memo = '', qty = '', price = '') {
            const id = ++rowId;
            const wrap = document.getElementById('tradeRows');
            const div = document.createElement('div');
            div.className = 'trade-row mb-2';
            div.id = `row-${id}`;
            div.innerHTML = `
        <input type="text"   placeholder="메모 (선택)"  value="${memo}"  id="m-${id}" oninput="calc()" class="text-left">
        <input type="number" placeholder="0"            value="${qty}"   id="q-${id}" oninput="calc()" min="0">
        <input type="number" placeholder="0.00"        value="${price}" id="p-${id}" oninput="calc()" min="0" step="any">
        <button class="btn-del" onclick="removeRow(${id})" title="삭제">✕</button>
    `;
            wrap.appendChild(div);
            calc();
        }

        function removeRow(id) {
            const el = document.getElementById(`row-${id}`);
            if (el) { el.remove(); calc(); }
        }

        function resetAll() {
            if (!confirm('모든 입력을 초기화하시겠습니까?')) return;
            document.getElementById('tradeRows').innerHTML = '';
            rowId = 0;
            initRows();
            calc();
        }

        /* ── Core calculation ── */
        function calc() {
            const rows = document.getElementById('tradeRows').querySelectorAll('.trade-row');
            let totalQty = 0, totalAmt = 0;
            const breakdown = [];

            rows.forEach(row => {
                const id = row.id.replace('row-', '');
                const q = parseFloat(document.getElementById(`q-${id}`)?.value) || 0;
                const p = parseFloat(document.getElementById(`p-${id}`)?.value) || 0;
                const amt = q * p;
                const memo = document.getElementById(`m-${id}`)?.value || '';
                if (q > 0 && p > 0) {
                    totalQty += q;
                    totalAmt += amt;
                    breakdown.push({ memo: memo || `거래 ${id}`, qty: q, price: p, amt });
                }
            });

            const avg = totalQty > 0 ? totalAmt / totalQty : NaN;

            /* update result card */
            const pop = el => { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); };
            const resAvg = document.getElementById('resAvg');
            const resQty = document.getElementById('resQty');
            const resTotal = document.getElementById('resTotal');

            resAvg.textContent = fmtP(avg);
            resQty.textContent = fmt(totalQty);
            resTotal.textContent = fmt(totalAmt);
            pop(resAvg); pop(resQty); pop(resTotal);

            /* breakdown table */
            const bWrap = document.getElementById('breakdownWrap');
            const bBody = document.getElementById('breakdownBody');
            if (breakdown.length > 0) {
                bWrap.style.display = '';
                bBody.innerHTML = breakdown.map(r => `
            <tr style="border-top:1px solid #374151">
                <td class="py-1 text-gray-300">${r.memo}</td>
                <td class="py-1 text-right text-gray-200">${fmt(r.qty)}</td>
                <td class="py-1 text-right text-gray-200">${fmtP(r.price)}</td>
                <td class="py-1 text-right text-gray-200">${fmt(r.amt)}</td>
                <td class="py-1 text-right text-yellow-400">${fmtP(r.amt / totalAmt * 100, 1)}%</td>
            </tr>
        `).join('');
            } else {
                bWrap.style.display = 'none';
            }

            return { avg, totalQty, totalAmt };
        }

        /* ── Init ── */
        function initRows() {
            addRow('기존 포지션', '', '');
            addRow('추가 매수', '', '');
        }

        setDir('LONG');
        initRows();
    </script>
</body>

</html>
